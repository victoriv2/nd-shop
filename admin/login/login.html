<div class="admin-login-wrapper" id="adminLoginScreen">
    <div class="admin-login-card">
        <div class="login-header">
            <div class="login-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h2>Admin Portal</h2>
            <p>Enter your credentials to access the secure area.</p>
        </div>

        <div class="login-form" id="loginFormSection">
            <div class="login-input-group">
                <label>Admin Email</label>
                <input type="email" id="adminLoginId" placeholder="admin@nd-shop.sbs or 08109316532" autocomplete="email" data-lpignore="true" data-form-type="other">
            </div>
            <div class="login-input-group" style="margin-top: 20px;">
                <label>Admin Password</label>
                <input type="password" id="adminLoginPassword" placeholder="••••••••" autocomplete="current-password" data-lpignore="true" data-form-type="other">
            </div>

            <div class="login-options">
                <span class="forgot-pwd" onclick="toggleForgotPassword()">Forgotten Password?</span>
            </div>

            <button class="admin-login-btn primary" onclick="processAdminLogin()">Secure Login</button>
        </div>

        <!-- Forgotten Password Section -->
        <div class="forgot-pwd-section" id="forgotPwdSection" style="display: none;">
            <div class="recovery-track" id="recoveryTrack">
                <!-- Step 1: Input Email/Phone -->
                <div class="recovery-step active-step" id="recoveryEmailPhase">
                    <div class="auth-method-options" style="margin-top: 10px;">
                        <button type="button" class="auth-method-btn" id="methodEmailBtn" onclick="sendRecoveryCode('email')">
                            <div class="method-icon email">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                            </div>
                            <div class="method-text">
                                <span class="method-title">Email Recovery</span>
                                <span class="method-desc">Send code to registered admin email</span>
                            </div>
                        </button>

                        <button type="button" class="auth-method-btn" id="methodSmsBtn" onclick="sendRecoveryCode('sms')">
                            <div class="method-icon sms">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                                </svg>
                            </div>
                            <div class="method-text">
                                <span class="method-title">SMS Recovery</span>
                                <span class="method-desc">Send code to registered admin phone</span>
                            </div>
                        </button>
                    </div>

                    <button class="admin-login-btn secondary" style="margin-top:20px;" onclick="toggleForgotPassword()">Cancel</button>
                </div>

                <!-- Step 2: Input OTP & Resend -->
                <div class="recovery-step" id="recoveryOtpPhase">
                    <div class="auth-otp-container admin-otp-container" style="display: flex; gap: 8px; justify-content: center; margin-top: 10px;">
                        <input type="text" class="auth-otp-input admin-otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="auth-otp-input admin-otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="auth-otp-input admin-otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="auth-otp-input admin-otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                    </div>

                    <div style="text-align: center; margin-top: 15px; margin-bottom: 5px;">
                        <a href="javascript:void(0)" style="font-size: 0.9rem; font-weight: 600; color: #8b5cf6; text-decoration: none;" id="adminResendOtpBtn" onclick="resendAdminRecoveryOtp()">Resend Code</a>
                    </div>

                    <button class="admin-login-btn primary" style="margin-top:20px;" onclick="verifyRecoveryOtp()">Verify Code</button>
                    <button class="admin-login-btn secondary" style="margin-top:10px;" onclick="toggleForgotPassword()">Cancel</button>
                </div>

                <!-- Step 3: Input New Password -->
                <div class="recovery-step" id="recoveryNewPasswordPhase">
                    <div class="login-input-group" style="margin-top: 10px;">
                        <label>New Password</label>
                        <input type="password" id="adminNewPassword" placeholder="••••••••">
                    </div>

                    <button class="admin-login-btn primary" id="btnVerifyRecovery" style="margin-top:20px;" onclick="resetAdminPassword()">Reset Password</button>
                    <button class="admin-login-btn secondary" style="margin-top:10px;" onclick="toggleForgotPassword()">Cancel</button>
                </div>
            </div>
        </div>
    </div>
</div>
