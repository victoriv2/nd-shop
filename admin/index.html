    <script>
        // Check Admin Login First
        document.addEventListener("DOMContentLoaded", checkAdminAuth);

        // Simple Admin Router logic
        const ADMIN_TAB_KEY = 'nd_admin_active_tab';

        // Map page names to tab IDs for restoration
        window.adminPageRestoreActions = {
            manageUsers: () => { if (typeof openManageUsers === 'function') openManageUsers(); },
            adminMessages: () => { if (typeof openAdminInbox === 'function') openAdminInbox(); },
            restock: () => { if (typeof openRestockModal === 'function') openRestockModal(); },
            debtorBook: () => { if (typeof openDebtorBook === 'function') openDebtorBook(); },
            debtPayments: () => { if (typeof openDebtRequests === 'function') openDebtRequests(); },
            adminCommunity: () => { if (typeof openCommunityChat === 'function') openCommunityChat(); },
            payoutPurchase: () => { if (typeof openPayoutPurchaseModal === 'function') openPayoutPurchaseModal(); },
            customerInsights: () => { if (typeof openCustomerInsights === 'function') openCustomerInsights(); },
            salesBook: () => { if (typeof openSalesBook === 'function') openSalesBook(); },
            receiptGenerator: () => { if (typeof window.openReceiptGeneratorAdmin === 'function') window.openReceiptGeneratorAdmin(); },
            expensesNotebook: () => { if (typeof openExpensesNotebook === 'function') openExpensesNotebook(); },
            taxRecords: () => { if (typeof openTaxRecords === 'function') openTaxRecords(); },
            deleteSales: () => { if (typeof openDeleteSales === 'function') openDeleteSales(); },
            recycleBin: () => { if (typeof openRecycleBin === 'function') openRecycleBin(); },
            hiddenShopProducts: () => { if (typeof openHiddenProducts === 'function') openHiddenProducts(); },
            incomeStructure: () => { if (typeof openIncomeStructure === 'function') openIncomeStructure(); },
            yearlyOverview: () => { if (typeof openYearlyOverview === 'function') openYearlyOverview(); },
            financialSettings: () => { if (typeof openFinancialSettings === 'function') openFinancialSettings(); },
            adminSecurity: () => { if (typeof openAdminSecurity === 'function') openAdminSecurity(); },
            maintenance: () => { if (typeof openMaintenance === 'function') openMaintenance(); },
            appContactSettings: () => { if (typeof openAppContactSettings === 'function') openAppContactSettings(); },
            systemBackup: () => { if (typeof openSystemBackup === 'function') openSystemBackup(); },
            aiMode: () => { if (typeof openAiChat === 'function') openAiChat(); },
            customersLend: () => { if (typeof openCustomersLend === 'function') openCustomersLend(); }
        };

        window.openAdminSubpage = function(actionKey) {
            const action = window.adminPageRestoreActions?.[actionKey];
            if (typeof action === 'function') {
                try {
                    action();
                } catch (e) {
                    console.warn('[Admin] Failed to restore subpage:', e);
                }
            }
        };

        window.loadAdminPage = function(pageName, subAction) {
            const pageMap = {
                'salesbook': 'tab-register',
                'progress': 'tab-progress',
                'product': 'tab-product',
                'request': 'tab-request',
                'menu': 'tab-menu'
            };
            const tabId = pageMap[pageName];
            if (tabId) {
                return activateAdminTab(tabId, subAction);
            }
            return Promise.resolve();
        };

        const ADMIN_TAB_TO_PAGE = {
            'tab-register': 'salesbook',
            'tab-progress': 'progress',
            'tab-product': 'product',
            'tab-request': 'request',
            'tab-menu': 'menu'
        };

        function parseAdminPageState() {
            try {
                const saved = localStorage.getItem('nd_admin_page_state');
                if (saved) {
                    const state = JSON.parse(saved);
                    if (state.timestamp && Date.now() - state.timestamp > 86400000) {
                        localStorage.removeItem('nd_admin_page_state');
                    } else if (state.page) {
                        return { page: state.page, subpage: state.subpage || null };
                    }
                }
            } catch (e) {
                console.warn('[Admin] Failed to parse saved page state', e);
            }

            const hash = (location.hash || '').replace(/^#/, '');
            if (hash && ADMIN_TAB_TO_PAGE[hash]) {
                return { page: ADMIN_TAB_TO_PAGE[hash], subpage: null };
            }

            const legacyTab = localStorage.getItem(ADMIN_TAB_KEY);
            if (legacyTab && ADMIN_TAB_TO_PAGE[legacyTab]) {
                return { page: ADMIN_TAB_TO_PAGE[legacyTab], subpage: null };
            }

            return null;
        }

        function activateAdminTab(tabId, pendingSubAction) {
            return new Promise((resolve) => {
                window.adminExpectedTabId = tabId;
                if (window.showGlobalRefreshLoader) window.showGlobalRefreshLoader();
                
                // Global Modal Cleanup: Remove all dynamically appended ghost modals to prevent ID duplication across tabs
                document.querySelectorAll('body > .admin-modal-overlay, body > [id$="Modal"]').forEach(el => {
                    if (el.id !== 'addSaleModal') {
                        el.remove();
                    }
                });
                const modalContainer = document.getElementById('modal-container');
                if (modalContainer) modalContainer.innerHTML = '';
                document.body.classList.remove('modal-open');
                
                document.querySelectorAll('.bottom-bar-item').forEach(i => i.classList.remove('active'));
                const item = document.getElementById(tabId);
                if (item) item.classList.add('active');

                const printBtn = document.getElementById('headerPrintBtn');

                // Helper to finalize and save state
                const finalize = () => {
                    if (window.hideGlobalRefreshLoader) setTimeout(window.hideGlobalRefreshLoader, 300);

                    try {
                        localStorage.setItem(ADMIN_TAB_KEY, tabId);
                    } catch (e) {}

                    if (window.realtimeSync) {
                        window.realtimeSync.savePageState({
                            page: ADMIN_TAB_TO_PAGE[tabId],
                            ...(pendingSubAction ? { subpage: pendingSubAction } : {})
                        });
                    }

                    if (tabId && tabId !== (location.hash || '').replace(/^#/, '')) {
                        history.replaceState({ tab: tabId }, '', location.pathname + location.search + '#' + tabId);
                    }

                    resolve();
                };

                if (tabId === 'tab-register') {
                    if (typeof loadRegister === 'function') loadRegister();
                    if (printBtn) printBtn.style.display = 'inline-flex';
                    finalize();
                } else if (tabId === 'tab-progress') {
                    if (typeof loadProgress === 'function') loadProgress();
                    if (printBtn) printBtn.style.display = 'inline-flex';
                    finalize();
                } else if (tabId === 'tab-product') {
                    if (typeof loadProduct === 'function') loadProduct();
                    if (printBtn) printBtn.style.display = 'none';
                    finalize();
                } else if (tabId === 'tab-request') {
                    if (typeof loadRequest === 'function') loadRequest();
                    if (printBtn) printBtn.style.display = 'none';
                    finalize();
                } else if (tabId === 'tab-menu') {
                    if (typeof loadMenu === 'function') {
                        loadMenu().then(() => {
                            if (pendingSubAction && typeof window.openAdminSubpage === 'function') {
                                setTimeout(() => {
                                    if (window.adminExpectedTabId !== 'tab-menu') return;
                                    try { window.openAdminSubpage(pendingSubAction); } catch(e) { console.warn(e); }
                                }, 50);
                            }
                            if (printBtn) printBtn.style.display = 'none';
                            finalize();
                        }).catch(err => {
                            console.warn('[Admin] Failed to restore menu page after load:', err);
                            if (printBtn) printBtn.style.display = 'none';
                            finalize();
                        });
                    } else {
                        if (printBtn) printBtn.style.display = 'none';
                        finalize();
                    }
                } else {
                    finalize();
                }
            });
        }

        document.querySelectorAll('.bottom-bar-item').forEach(item => {
            item.addEventListener('click', () => {
                const locks = JSON.parse(localStorage.getItem('nd_admin_locks') || '{}');
                const lockKey = item.id; // e.g. "tab-register"
                if (locks[lockKey]) {
                    if (typeof _checkModuleAdminAuth === 'function') {
                        _checkModuleAdminAuth(lockKey, () => activateAdminTab(item.id));
                    } else {
                        activateAdminTab(item.id);
                    }
                } else {
                    activateAdminTab(item.id);
                }
            });
        });


        // Global Download button routing
        document.addEventListener('click', (e) => {
            if (e.target && e.target.id === 'headerPrintBtn') {
                e.preventDefault();
                e.stopPropagation();

                const registerTab = document.getElementById('tab-register');
                const progressTab = document.getElementById('tab-progress');

                if (registerTab && registerTab.classList.contains('active')) {
                    if (typeof window.generateRegisterPDF === 'function') {
                        window.generateRegisterPDF();
                    }
                } else if (progressTab && progressTab.classList.contains('active')) {
                    if (typeof window.generateProgressPDF === 'function') {
                        window.generateProgressPDF();
                    }
                }
            }
        }, true);

        // Note: checkProductOutOfStock and getRemainingProductStock are now managed in global-fixes.js for shared access.


        function updateRequestNotification() {
            const requests = JSON.parse(localStorage.getItem('nd_requests_data') || '[]');
            const pendingCount = requests.filter(r => r.status === 'Pending').length;
            const tab = document.getElementById('tab-request');

            if (tab) {
                if (pendingCount > 0) {
                    tab.setAttribute('data-badge', pendingCount > 9 ? '9+' : pendingCount);
                    tab.classList.add('has-notification');
                } else {
                    tab.classList.remove('has-notification');
                    tab.removeAttribute('data-badge');
                }
            }

            // Product Out of Stock Badge Notification (Automated Inventory Tracker Option A)
            const productTab = document.getElementById('tab-product');
            if (productTab) {
                const products = JSON.parse(localStorage.getItem('nd_products_data') || '[]');
                
                // Track unique product IDs that are out of stock
                const uniqueOut = new Set();
                products.forEach(p => {
                    if (!p.isDeleted && !(p.isHidden || p.cleared)) {
                        if (window.checkProductOutOfStock(p.id)) {
                            uniqueOut.add(p.id);
                        }
                    }
                });
                
                const outOfStockCount = uniqueOut.size;
                if (outOfStockCount > 0) {
                    productTab.setAttribute('data-badge', outOfStockCount > 9 ? '9+' : outOfStockCount);
                    productTab.classList.add('has-notification');
                } else {
                    productTab.classList.remove('has-notification');
                    productTab.removeAttribute('data-badge');
                }
            }

            // Also badge the Menu tab with total alerts (requests + messages)
            const menuTab = document.getElementById('tab-menu');
            if (menuTab) {
                const messages = JSON.parse(localStorage.getItem('nd_messages') || '[]');
                const unreadCount = messages.filter(m => m.senderId !== 'ADMIN' && !(m.readBy || []).includes('ADMIN') && !(m.deletedFor || []).includes('ADMIN')).length;
                const debtReqs = JSON.parse(localStorage.getItem('nd_debt_requests') || '[]');
                const debtReqCount = debtReqs.filter(r => r.status === 'Pending').length;
                const totalAlerts = pendingCount + unreadCount + debtReqCount;
                
                if (totalAlerts > 0) {
                    menuTab.setAttribute('data-badge', totalAlerts > 9 ? '9+' : totalAlerts);
                    menuTab.classList.add('has-notification');
                } else {
                    menuTab.classList.remove('has-notification');
                    menuTab.removeAttribute('data-badge');
                }
            }
        }

        setInterval(updateRequestNotification, 2000);
        updateRequestNotification();

        // Initial load — single restore path (realtime-sync skips admin when this flag is set)
        window.__adminPageRestoreHandled = true;
        const restoreState = parseAdminPageState();

        if (restoreState && restoreState.page && typeof window.loadAdminPage === 'function') {
            window.__pageStateRestored = true;
            window.loadAdminPage(restoreState.page, restoreState.subpage).catch(e => {
                console.warn('[Admin] Failed to restore saved page state', e);
                activateAdminTab('tab-register');
            });
        } else {
            activateAdminTab('tab-register');
            window.__pageStateRestored = true;
        }

        // Prevent number inputs from changing value on scroll
        document.addEventListener('wheel', function(e) {
            if (document.activeElement && document.activeElement.type === 'number') {
                document.activeElement.blur();
            }
        }, { passive: true });

        // Listen for Supabase sync completion to auto-refresh current active tab's UI
        window.addEventListener('nd_sync_complete', () => {
            const tabId = window.adminExpectedTabId;
            if (tabId === 'tab-product') {
                if (typeof window.reloadAdminProducts === 'function') window.reloadAdminProducts();
                if (typeof window.renderProductsGlobal === 'function') window.renderProductsGlobal();
            } else if (tabId === 'tab-request') {
                if (typeof renderAdminRequests === 'function') renderAdminRequests();
            } else if (tabId === 'tab-register') {
                if (typeof renderSalesTable === 'function') renderSalesTable();
                if (typeof updateStatsSummary === 'function') updateStatsSummary();
            } else if (tabId === 'tab-progress') {
                if (typeof renderAdminProgress === 'function') renderAdminProgress();
            }
        });

    </script>

        .has-notification::after {
            content: attr(data-badge);
            position: absolute;

            background: #ff4d4d;
            color: white;
            font-size: 10px;
            font-weight: 800;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.4);
        }

        /* Branding Styles */
        .shop-logo-text {
            font-size: 1.4rem;
