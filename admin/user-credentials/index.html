<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>System Users & Credentials Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-dark: #f8fafc;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-blue: #8b5cf6;
            --accent-purple: #8b5cf6;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-blue);
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
            max-width: 400px;
            transition: all 0.3s ease;
        }

        .search-bar:focus-within {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(27, 38, 59, 0.15);
        }

        .search-bar svg {
            color: var(--text-muted);
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: var(--text-main);
            width: 100%;
            outline: none;
            padding-left: 12px;
            font-size: 1rem;
        }

        .search-bar input::placeholder {
            color: rgba(160, 174, 192, 0.6);
        }

        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }

        .user-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease backwards;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .user-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .user-card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--card-border);
        }

        .avatar {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            background: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-blue);
            border: 1px solid #bfdbfe;
            text-transform: uppercase;
        }

        .user-name-group {
            flex: 1;
            overflow: hidden;
        }

        .user-name-group h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-id {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: monospace;
            background: #f8fafc;
            padding: 3px 8px;
            border-radius: 6px;
            display: inline-block;
            border: 1px solid var(--card-border);
        }

        .detail-row {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            gap: 16px;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            transition: background 0.2s ease;
        }

        .detail-row:hover {
            background: #f1f5f9;
        }

        .detail-row:last-child {
            margin-bottom: 0;
        }

        .detail-icon {
            color: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(27, 38, 59, 0.1);
            padding: 8px;
            border-radius: 8px;
        }

        .detail-content {
            flex: 1;
            overflow: hidden;
        }

        .detail-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .detail-value {
            font-size: 0.95rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: monospace;
            display: flex;
            align-items: center;
        }

        .password-row .detail-icon {
            color: var(--accent-blue);
            background: rgba(27, 38, 59, 0.1);
        }

        .password-row .detail-value {
            color: var(--text-main);
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            color: var(--accent-blue);
            background: #f0f4f8;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            grid-column: 1 / -1;
        }

        .empty-icon {
            color: var(--text-muted);
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .empty-state p {
            color: var(--text-muted);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast svg {
            color: var(--accent-blue);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }



        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            .search-bar {
                max-width: 100%;
            }
            .user-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">


        <header>
            <h1>User Accounts Manager</h1>
            <p class="subtitle">Complete administrative view of all registered credentials</p>
        </header>

        <div class="controls">
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Total Users</span>
                    <span class="stat-value" id="totalUsers">0</span>
                </div>
            </div>
            
            <div class="search-bar">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" placeholder="Search by name, email, or phone...">
            </div>
        </div>

        <div class="user-grid" id="userGrid">
            <!-- User cards will be injected here -->
        </div>
    </div>

    <div class="toast" id="toast">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span id="toastMsg">Copied to clipboard!</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userGrid = document.getElementById('userGrid');
            const searchInput = document.getElementById('searchInput');
            const totalUsersSpan = document.getElementById('totalUsers');
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');

            // Fetch users from localStorage
            let users = [];
            try {
                users = JSON.parse(localStorage.getItem('nd_users') || '[]');
            } catch (e) {
                console.error("Error parsing users from localStorage", e);
            }

            // Update stats
            totalUsersSpan.textContent = users.length;

            function getInitials(name) {
                if (!name) return 'U';
                const parts = name.split(' ').filter(p => p.trim() !== '');
                if (parts.length >= 2) {
                    return (parts[0][0] + parts[1][0]).toUpperCase();
                }
                return name.substring(0, 2).toUpperCase();
            }

            function copyToClipboard(text, label) {
                navigator.clipboard.writeText(text).then(() => {
                    toastMsg.textContent = `${label} copied to clipboard!`;
                    toast.classList.add('show');
                    setTimeout(() => {
                        toast.classList.remove('show');
                    }, 3000);
                }).catch(err => {
                    console.error('Failed to copy text: ', err);
                });
            }

            window.togglePassword = function(btn) {
                const passwordRow = btn.closest('.password-row');
                const span = passwordRow.querySelector('span[data-hidden]');
                if (!span) return;
                
                if (span.getAttribute('data-hidden') === 'true') {
                    span.textContent = span.getAttribute('data-value');
                    span.setAttribute('data-hidden', 'false');
                    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
                } else {
                    span.textContent = '••••••••';
                    span.setAttribute('data-hidden', 'true');
                    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
                }
            };

            window.handleCopy = function(btn, type) {
                const val = btn.getAttribute('data-val');
                copyToClipboard(val, type);
            };

            function renderUsers(usersToRender) {
                userGrid.innerHTML = '';

                if (usersToRender.length === 0) {
                    userGrid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                            </div>
                            <h2>No users found</h2>
                            <p>There are currently no users matching your criteria.</p>
                        </div>
                    `;
                    return;
                }

                usersToRender.forEach((user, index) => {
                    const passValue = user.password || 'N/A';
                    
                    const card = document.createElement('div');
                    card.className = 'user-card';
                    card.style.animationDelay = `${index * 0.05}s`;

                    card.innerHTML = `
                        <div class="card-header">
                            <div class="avatar">${getInitials(user.name)}</div>
                            <div class="user-name-group">
                                <h3 title="${user.name || 'Unknown User'}">${user.name || 'Unknown User'}</h3>
                                <span class="user-id">${user.id || 'NO-ID'}</span>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="detail-row">
                            <div class="detail-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            </div>
                            <div class="detail-content">
                                <div class="detail-label">Email Address</div>
                                <div class="detail-value" title="${user.email || 'N/A'}">${user.email || 'N/A'}</div>
                            </div>
                            <div class="action-btns">
                                <button class="icon-btn" data-val="${user.email || ''}" onclick="handleCopy(this, 'Email')" title="Copy Email">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                </button>
                            </div>
                        </div>

                        <!-- Phone -->
                        <div class="detail-row">
                            <div class="detail-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                            </div>
                            <div class="detail-content">
                                <div class="detail-label">Phone Number</div>
                                <div class="detail-value">${user.phone || 'N/A'}</div>
                            </div>
                            <div class="action-btns">
                                <button class="icon-btn" data-val="${user.phone || ''}" onclick="handleCopy(this, 'Phone')" title="Copy Phone">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                </button>
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="detail-row password-row">
                            <div class="detail-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            </div>
                            <div class="detail-content">
                                <div class="detail-label">Account Password</div>
                                <div class="detail-value">
                                    <span data-value="${passValue.replace(/"/g, '&quot;')}" data-hidden="true">••••••••</span>
                                </div>
                            </div>
                            <div class="action-btns">
                                <button class="icon-btn" onclick="togglePassword(this)" title="Toggle Visibility">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                </button>
                                <button class="icon-btn" data-val="${passValue.replace(/"/g, '&quot;')}" onclick="handleCopy(this, 'Password')" title="Copy Password">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                </button>
                            </div>
                        </div>
                    `;

                    userGrid.appendChild(card);
                });
            }

            renderUsers(users);

            // Filter functionality
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = users.filter(u => 
                    (u.name && u.name.toLowerCase().includes(term)) ||
                    (u.email && u.email.toLowerCase().includes(term)) ||
                    (u.phone && u.phone.toLowerCase().includes(term))
                );
                renderUsers(filtered);
            });
        });
    </script>
</body>
</html>
