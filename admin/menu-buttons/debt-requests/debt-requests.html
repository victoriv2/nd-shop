<!-- Debt Payments Page Full Overlay -->
<div id="debtRequestsMainOverlay" class="admin-request-page" style="position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 99999; background: #f8fafc; padding: 20px 0 20px 0; overflow-y: auto;">
    <button onclick="closeDebtRequests()" style="position: absolute; top: 15px; left: 5%; background: white; border: 1px solid #e2e8f0; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); color: #333; cursor: pointer; z-index: 10;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <h2 class="admin-request-title" style="margin-top: 10px; margin-bottom: 25px;">Debt Payments</h2>
    
    <div class="request-controls">
        <div class="request-filter-capsules" style="padding-top: 10px; margin-top: -10px;">
            <button class="request-filter-btn active" onclick="setDrFilter('All', this)">All</button>
            <button class="request-filter-btn" id="drPendingFilterBtn" onclick="setDrFilter('Pending', this)">Pending</button>
            <button class="request-filter-btn" onclick="setDrFilter('Approved', this)">Approved</button>
            <button class="request-filter-btn" onclick="setDrFilter('Declined', this)">Declined</button>
        </div>
    </div>

    <div id="drList" class="request-list">
        <!-- Items injected by JS -->
    </div>
</div>

<!-- Receipt Image Fullscreen View -->
<div id="drReceiptModal" class="admin-modal-overlay" style="z-index: 100001" onclick="this.classList.remove('show');">
    <div style="position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); width: 90%; max-width: 500px; padding: 20px;">
        <img id="drReceiptImgFull" src="" style="width: 100%; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <p style="text-align: center; color: white; margin-top: 10px; font-weight: 500;">Tap anywhere to close</p>
    </div>
</div>

<!-- Styled Confirm Dialog -->
<div id="drConfirmDialog" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:200000; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:20px; padding:28px 24px; width:88%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.2); text-align:center;">
        <div id="drConfirmIcon" style="width:56px;height:56px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;"></div>
        <h3 id="drConfirmTitle" style="margin:0 0 10px;font-size:1.1rem;color:#1a1a1a;"></h3>
        <p id="drConfirmMessage" style="margin:0 0 24px;font-size:0.9rem;color:#666;line-height:1.5;"></p>
        <div style="display:flex;gap:10px;">
            <button id="drConfirmCancelBtn" style="flex:1;padding:12px;border-radius:12px;border:1.5px solid #e2e8f0;background:white;font-size:0.9rem;font-weight:600;color:#555;cursor:pointer;">Cancel</button>
            <button id="drConfirmOkBtn" style="flex:1;padding:12px;border-radius:12px;border:none;font-size:0.9rem;font-weight:700;color:white;cursor:pointer;"></button>
        </div>
    </div>
</div>

<!-- Styled Prompt Dialog (for amount entry) -->
<div id="drPromptDialog" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:200000; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:20px; padding:28px 24px; width:88%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.2);">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
            <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="22" height="22"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <div>
                <div style="font-size:1rem;font-weight:700;color:#1a1a1a;" id="drPromptTitle"></div>
                <div style="font-size:0.8rem;color:#888;" id="drPromptSubtitle"></div>
            </div>
        </div>
        <div style="background:#f8fafc;border-radius:12px;padding:16px;margin-bottom:16px;border:1.5px solid #e2e8f0;">
            <label style="font-size:0.75rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:8px;">Amount (₦) or type CLEAR</label>
            <input id="drPromptInput" type="text" placeholder="e.g. 5000 or CLEAR" style="width:100%;border:none;background:transparent;font-size:1.2rem;font-weight:700;color:#1a1a1a;outline:none;box-sizing:border-box;">
        </div>
        <p id="drPromptAiHint" style="font-size:0.82rem;color:#8b5cf6;background:#f0f4f8;border-radius:10px;padding:10px 12px;margin-bottom:18px;line-height:1.5;"></p>
        <div style="display:flex;gap:10px;">
            <button id="drPromptCancelBtn" style="flex:1;padding:12px;border-radius:12px;border:1.5px solid #e2e8f0;background:white;font-size:0.9rem;font-weight:600;color:#555;cursor:pointer;">Cancel</button>
            <button id="drPromptOkBtn" style="flex:1;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#10b981,#059669);font-size:0.9rem;font-weight:700;color:white;cursor:pointer;">Confirm</button>
        </div>
    </div>
</div>

<!-- Styled Alert Dialog -->
<div id="drAlertDialog" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:200001; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:20px; padding:28px 24px; width:88%; max-width:360px; box-shadow:0 20px 60px rgba(0,0,0,0.2); text-align:center;">
        <div id="drAlertIcon" style="width:56px;height:56px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;"></div>
        <h3 id="drAlertTitle" style="margin:0 0 10px;font-size:1.05rem;color:#1a1a1a;"></h3>
        <p id="drAlertMessage" style="margin:0 0 24px;font-size:0.9rem;color:#666;line-height:1.5;"></p>
        <button id="drAlertOkBtn" style="width:100%;padding:13px;border-radius:12px;border:none;font-size:0.95rem;font-weight:700;color:white;cursor:pointer;background:#8b5cf6;">OK</button>
    </div>
</div>
