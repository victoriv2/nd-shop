<!-- admin/menu-buttons/financial-settings/financial-settings.html -->
<div class="admin-modal-overlay" id="financialSettingsModal">
    <div class="admin-modal-content">
        <div class="admin-modal-header">
            <h3>Financial Settings</h3>
            <!-- Clear text symbols only, no emojis/icons -->
            <button class="admin-modal-close" onclick="closeFinancialSettings()">×</button>
        </div>

        <div class="admin-modal-body">
            <div class="financial-settings-container">
                <!-- Data entry group: Direct user input only -->
                <div class="financial-group" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 25px; border-bottom: 1px solid #e2e8f0;">
                    <label class="financial-label" style="margin-bottom: 0;">Enable Application Payouts</label>
                    <label class="switch" style="position: relative; display: inline-block; width: 50px; height: 28px;">
                        <input type="checkbox" id="payoutEnableSwitch" checked style="opacity: 0; width: 0; height: 0;" onchange="var s=this.nextElementSibling;s.style.backgroundColor=this.checked?'#8b5cf6':'#cbd5e1';s.querySelector('.knob').style.transform=this.checked?'translateX(22px)':'translateX(0)'">
                        <span class="slider round" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; transition: .4s; border-radius: 34px;">
                            <span class="knob" style="position: absolute; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%;"></span>
                        </span>
                    </label>
                </div>

                <div class="financial-group" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 25px; border-bottom: 1px solid #e2e8f0;">
                    <label class="financial-label" style="margin-bottom: 0;">Enable Reward Purchases</label>
                    <label class="switch" style="position: relative; display: inline-block; width: 50px; height: 28px;">
                        <input type="checkbox" id="rewardPurchaseEnableSwitch" checked style="opacity: 0; width: 0; height: 0;" onchange="var s=this.nextElementSibling;s.style.backgroundColor=this.checked?'#8b5cf6':'#cbd5e1';s.querySelector('.knob').style.transform=this.checked?'translateX(22px)':'translateX(0)'">
                        <span class="slider round" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; transition: .4s; border-radius: 34px;">
                            <span class="knob" style="position: absolute; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%;"></span>
                        </span>
                    </label>
                </div>

                <div class="financial-group" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 25px; border-bottom: 1px solid #e2e8f0;">
                    <label class="financial-label" style="margin-bottom: 0;">Enable Support Referral Earnings</label>
                    <label class="switch" style="position: relative; display: inline-block; width: 50px; height: 28px;">
                        <input type="checkbox" id="referralEarningsEnableSwitch" checked style="opacity: 0; width: 0; height: 0;" onchange="var s=this.nextElementSibling;s.style.backgroundColor=this.checked?'#8b5cf6':'#cbd5e1';s.querySelector('.knob').style.transform=this.checked?'translateX(22px)':'translateX(0)'">
                        <span class="slider round" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; transition: .4s; border-radius: 34px;">
                            <span class="knob" style="position: absolute; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%;"></span>
                        </span>
                    </label>
                </div>
                
                <div class="financial-group">
                    <label class="financial-label">Default Reward Rate (Payout %)</label>
                    <div class="financial-input-wrapper">
                        <!-- Direct numeric input as requested -->
                        <input type="number" id="payoutRateInput" placeholder="0.00" value="2" step="0.1" min="0"
                            max="100">
                        <span class="percentage-symbol">%</span>
                    </div>
                </div>



                <!-- Plain descriptive text, no glowing badges -->
                <div class="financial-help-text">
                    This numeric input directly controls the financial calculations for all pending customer requests
                    and future recorded sales. Change takes effect immediately upon saving.
                </div>
            </div>
        </div>

        <!-- Footer Footer (Plain, No Glow/Motion) -->
        <div class="admin-modal-footer"
            style="padding: 24px 28px; background: #fff; border-top: 1px solid rgba(0,0,0,0.05);">
            <!-- High focus button without hover motion/glow -->
            <button class="admin-modern-btn primary" id="saveFinancialSettings">Save Financial Updates</button>
        </div>
    </div>
</div>
