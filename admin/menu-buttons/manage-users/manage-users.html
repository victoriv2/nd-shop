<div class="admin-modal-overlay" id="manageUsersModal">
    <div class="admin-modal-content full-page">
        <div class="admin-modal-header">
            <h3>Manage Users</h3>
            <button class="admin-modal-close" onclick="closeManageUsers()">✕</button>
        </div>
        <div class="admin-modal-body">
            <div class="mu-search" style="display: flex; gap: 10px; margin-bottom: 24px;">
                <input type="text" id="muSearchInput" placeholder="Search by name or email..."
                    style="flex: 1; min-width: 0;">
                <div style="position: relative;">
                    <button
                        onclick="const dd = document.getElementById('muMainSortDropdown'); dd.style.display = (dd.style.display === 'none' ? 'block' : 'none'); event.stopPropagation();"
                        style="padding: 14px 18px; border-radius: 16px; border: 1px solid #e2e8f0; background: white; font-weight: 600; font-size: 0.95rem; color: #444; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 8px; transition: 0.2s;"
                        onmouseover="this.style.borderColor='#8b5cf6'" onmouseout="this.style.borderColor='#e2e8f0'">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                        </svg>
                        Filter
                    </button>
                    <div id="muMainSortDropdown"
                        style="display: none; position: absolute; right: 0; top: 110%; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 220px; z-index: 100; overflow: hidden; border: 1px solid #f1f5f9;">
                        <div class="mu-main-sort-option active" data-sort="newest"
                            onclick="setMuMainSort('newest', this)"
                            style="padding: 14px 18px; font-size: 0.9rem; cursor: pointer; border-bottom: 1px solid #f8fafc; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 8px;">
                            New to Old</div>
                        <div class="mu-main-sort-option" data-sort="oldest" onclick="setMuMainSort('oldest', this)"
                            style="padding: 14px 18px; font-size: 0.9rem; cursor: pointer; border-bottom: 1px solid #f8fafc; color: #64748b; display: flex; align-items: center; gap: 8px;">
                            Old to New</div>
                        <div class="mu-main-sort-option" data-sort="az" onclick="setMuMainSort('az', this)"
                            style="padding: 14px 18px; font-size: 0.9rem; cursor: pointer; border-bottom: 1px solid #f8fafc; color: #64748b; display: flex; align-items: center; gap: 8px;">
                            A - Z</div>
                        <div class="mu-main-sort-option" data-sort="za" onclick="setMuMainSort('za', this)"
                            style="padding: 14px 18px; font-size: 0.9rem; cursor: pointer; border-bottom: 1px solid #f8fafc; color: #64748b; display: flex; align-items: center; gap: 8px;">
                            Z - A</div>
                        <div class="mu-main-sort-option" data-sort="highlow" onclick="setMuMainSort('highlow', this)"
                            style="padding: 14px 18px; font-size: 0.9rem; cursor: pointer; border-bottom: 1px solid #f8fafc; color: #64748b; display: flex; align-items: center; gap: 8px;">
                            High to Low</div>
                        <div class="mu-main-sort-option" data-sort="lowhigh" onclick="setMuMainSort('lowhigh', this)"
                            style="padding: 14px 18px; font-size: 0.9rem; cursor: pointer; border-bottom: 1px solid #f8fafc; color: #64748b; display: flex; align-items: center; gap: 8px;">
                            Low to High</div>
                        <div class="mu-main-sort-option" data-sort="pending" onclick="setMuMainSort('pending', this)"
                            style="padding: 14px 18px; font-size: 0.9rem; cursor: pointer; border-bottom: 1px solid #f8fafc; color: #64748b; display: flex; justify-content: space-between; align-items: center;">
                            <div style="display:flex; align-items:center; gap:8px;">Pending Requests</div> <span
                                id="muFilterPendingBadge"
                                style="background:#ff4d4d; color:white; font-size:10px; padding:2px 6px; border-radius:12px; font-weight:800; display:none; box-shadow:0 0 6px rgba(255,77,77,0.4);">0</span>
                        </div>
                        <div class="mu-main-sort-option" data-sort="messages" onclick="setMuMainSort('messages', this)"
                            style="padding: 14px 18px; font-size: 0.9rem; cursor: pointer; color: #64748b; display: flex; justify-content: space-between; align-items: center;">
                            <div style="display:flex; align-items:center; gap:8px;">New Messages</div> <span
                                style="background:#8b5cf6; color:white; font-size:9px; padding:2px 6px; border-radius:10px; font-weight:bold;">Soon</span>
                        </div>
                    </div>
                </div>
            </div>
            <div id="muUserList" class="mu-user-list">
                <!-- Users listed here -->
            </div>
        </div>
    </div>
</div>

<!-- Extra container for nested user info modal -->
<div id="nested-modal-container"></div>
