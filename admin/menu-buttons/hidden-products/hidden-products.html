<div class="admin-modal-page" id="hiddenProductsPage" style="display: none; flex-direction: column; background: #f8fafc; height: 100vh; position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);">
    
    <div class="admin-modal-header" style="background: white; border-bottom: 1px solid #e2e8f0; padding: 20px 24px;">
        <h3 style="margin: 0; font-size: 1.25rem; font-weight: 800; color: #0f172a; display: flex; align-items: center; gap: 10px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
                <line x1="2" x2="22" y1="2" y2="22"/>
            </svg>
            Hidden Shop Products
        </h3>
        <button class="admin-modal-close" id="closeHiddenProductsBtn">✕</button>
    </div>
    
    <div style="padding: 16px 24px; background: white; border-bottom: 1px solid #e2e8f0;">
        <div style="font-size: 0.9rem; color: #64748b; line-height: 1.5;">
            These products have been hidden from the main shop and aren't visible for sales. You can unhide them here to reactivate their records.
        </div>
    </div>

    <div class="admin-modal-body" style="padding: 24px; overflow-y: auto; flex: 1;">
        <div id="hpItemsList"></div>
    </div>
</div>
