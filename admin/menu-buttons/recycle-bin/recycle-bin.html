<div class="admin-modal-page" id="recycleBinPage" style="display: none; flex-direction: column; background: #f8fafc; height: 100vh; position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);">
    
    <!-- Passcode Gateway -->
    <div id="rbPasscodeGateway" style="position: absolute; top:0; left:0; width:100%; height:100%; background:white; z-index: 10000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:20px;">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <h2 style="font-size:1.4rem; color:#1e293b; margin-bottom:10px;">Security Check</h2>
        <p style="color:#64748b; font-size:0.95rem; margin-bottom:20px;">Enter PIN to access Recycle Bin</p>
        
        <div style="display:flex; gap:12px; margin-bottom:15px;">
            <input type="tel" class="rb-pass-char" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off" autocorrect="off" autocapitalize="off" data-lpignore="true" data-form-type="other" style="width:50px; height:60px; font-size:24px; text-align:center; border:2px solid #e2e8f0; border-radius:12px; font-weight:700; background:#f8fafc; outline:none; -webkit-text-security:disc;" autofocus>
            <input type="tel" class="rb-pass-char" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off" autocorrect="off" autocapitalize="off" data-lpignore="true" data-form-type="other" style="width:50px; height:60px; font-size:24px; text-align:center; border:2px solid #e2e8f0; border-radius:12px; font-weight:700; background:#f8fafc; outline:none; -webkit-text-security:disc;">
            <input type="tel" class="rb-pass-char" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off" autocorrect="off" autocapitalize="off" data-lpignore="true" data-form-type="other" style="width:50px; height:60px; font-size:24px; text-align:center; border:2px solid #e2e8f0; border-radius:12px; font-weight:700; background:#f8fafc; outline:none; -webkit-text-security:disc;">
            <input type="tel" class="rb-pass-char" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off" autocorrect="off" autocapitalize="off" data-lpignore="true" data-form-type="other" style="width:50px; height:60px; font-size:24px; text-align:center; border:2px solid #e2e8f0; border-radius:12px; font-weight:700; background:#f8fafc; outline:none; -webkit-text-security:disc;">
        </div>
        <p id="rbPassError" style="color:#ef4444; font-size:0.85rem; height:20px; margin-bottom:15px; font-weight:600;"></p>
        <button id="rbPassCancel" style="padding:12px 30px; border-radius:12px; background:#f1f5f9; color:#475569; font-weight:700; border:none; cursor:pointer;" onclick="closeRecycleBin()">Cancel</button>
    </div>

    <div class="admin-modal-header" style="background: white; border-bottom: 1px solid #e2e8f0; padding: 20px 24px;">
        <h3 style="margin: 0; font-size: 1.25rem; font-weight: 800; color: #0f172a; display: flex; align-items: center; gap: 10px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
            Recycle Bin
        </h3>
        <button class="admin-modal-close" id="closeRecycleBinBtn">✕</button>
    </div>
    
    <div style="padding: 16px 24px; background: white; border-bottom: 1px solid #e2e8f0;">
        <div style="font-size: 0.9rem; color: #64748b; line-height: 1.5;">
            Products that are deleted or cleared during the current month can be restored here. At the end of the month, items in this bin are permanently erased.
        </div>
    </div>

    <div class="admin-modal-body" style="padding: 24px; overflow-y: auto; flex: 1;">
        <div id="rbItemsList"></div>
    </div>
</div>
