    <script>
        // Redirect to login immediately if not authenticated to prevent page flash
        if (!sessionStorage.getItem('nd_logged_in_user') && !localStorage.getItem('nd_logged_in_user')) {
            window.location.href = 'auth/login.html';
        }
        
        // Maintenance Mode Guard
        const isMaint = localStorage.getItem('nd_maintenance_mode') === 'true';
        if (isMaint) {
            const user = JSON.parse(sessionStorage.getItem('nd_logged_in_user') || localStorage.getItem('nd_logged_in_user') || '{}');
            // If they are not an admin, redirect them to a simple maintenance page (or show an alert/body replace)
            if (user.id !== '00000ND' && user.id !== 'ADMIN') { // assuming 00000ND or ADMIN is admin
                document.documentElement.innerHTML = '<div style="display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; text-align:center; padding:20px;"><div><h1 style="color:#6366f1;">Shop under maintenance</h1><p>We are currently updating our shop. Please check back later.</p><button onclick="sessionStorage.removeItem(\'nd_logged_in_user\'); localStorage.removeItem(\'nd_logged_in_user\'); window.location.reload();" style="margin-top:20px; padding:10px 20px; border:none; background:#6366f1; color:white; border-radius:8px; cursor:pointer;">Log Out</button></div></div>';
                // Stop further execution
                throw new Error("Maintenance mode active");
            }
        }
    </script>

    <div class="product-cart-btn" id="fabCartBtn" style="display:none;" onclick="if(typeof renderCartItems === 'function') { renderCartItems(); document.getElementById('cartModalContainer').classList.add('show'); document.getElementById('cartOverlay').classList.add('show'); document.body.classList.add('modal-open'); }">

    <style>
        .product-cart-btn {
            position: fixed;
            bottom: 85px;
            right: 5%;
            width: auto;
            min-width: 50px;
            height: 50px;
            background-color: #6366f1;
            color: white;
            padding: 0 15px;
            border-radius: 12px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(27, 38, 59, 0.4);
            z-index: 600;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-cart-text {
            display: inline-block;
            font-weight: 700;
            font-size: 0.95rem;
            margin-left: 8px;
            white-space: nowrap;
            transition: width 0.5s ease, opacity 0.3s ease, margin 0.3s ease;
        }
        .product-cart-btn.minimized {
            width: 50px;
            padding: 0;
        }
        .product-cart-btn.minimized .product-cart-text {
            width: 0;
            opacity: 0;
            margin: 0;
            overflow: hidden;
        }
        .product-cart-btn:active { transform: scale(0.95); }
        .product-cart-btn:hover { background-color: #6366f1; }
        .fab-cart-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ef4444;
            color: white;
            border-radius: 12px;
            min-width: 18px;
            height: 18px;
            padding: 0 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 800;
            border: 2px solid white;
            box-shadow: 0 0 8px rgba(239,68,68,0.4);
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* Branding Styles */
        .shop-logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            color: #8b5cf6;
            letter-spacing: -0.5px;
            background: none;
            -webkit-background-clip: unset;
            -webkit-text-fill-color: unset;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .shop-logo-text:hover {
            transform: scale(1.05);
        }
        [data-theme="dark"] .shop-logo-text {
            background: none;
            color: #E0E1DD;
            -webkit-background-clip: unset;
            -webkit-text-fill-color: unset;
        }
