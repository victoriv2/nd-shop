<div class="product-page-wrapper">
    <h2 class="product-title">Available Product</h2>
    <div class="search-filter-container">
        <div class="search-wrapper" id="searchWrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-search-icon lucide-search">
                <path d="m21 21-4.34-4.34" />
                <circle cx="11" cy="11" r="8" />
            </svg>
            <input type="text" id="productSearchInput" autocomplete="off" placeholder="Search product">
        </div>
        <button class="add-btn" id="addProductBtn" style="display: none;">
            <!-- Hidden as per user preference (Admin adds, Main views) -->
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>
        <button class="filter-btn" id="filterBtn">Filter</button>
    </div>

    <!-- Product Category Tabs -->
    <div class="user-product-tabs-wrapper">
        <div class="user-product-tabs">
            <button class="up-tab-btn active" data-tab="all">All</button>
            <button class="up-tab-btn" data-tab="special">Analytic</button>
            <button class="up-tab-btn" data-tab="default">Default</button>
            <button class="up-tab-btn" data-tab="flexible">Flexible</button>
            <button class="up-tab-btn" data-tab="custom">Custom</button>
        </div>
    </div>

    <style>
        .user-product-tabs-wrapper {
            padding: 0 16px;
            margin-bottom: 16px;
            margin-top: 16px;
        }
        .user-product-tabs {
            background-color: #f1f5f9;
            border-radius: 12px;
            display: flex;
            padding: 4px;
            gap: 4px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.03);
            overflow-x: auto;
            scrollbar-width: none;
            overscroll-behavior-x: contain;
            -webkit-overflow-scrolling: touch;
        }
        .user-product-tabs::-webkit-scrollbar {
            display: none;
        }
        .up-tab-btn {
            flex: 1;
            min-width: fit-content;
            padding: 10px 16px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }
        .up-tab-btn.active {
            background: white;
            color: #8b5cf6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .up-tab-btn:active:not(.active) {
            background: #e2e8f0;
        }
    </style>

    <!-- Container for dynamically rendered products -->
    <div id="dynamicProductList" class="dynamic-product-list">
        <!-- Products will be injected here by product.js -->
    </div>

</div>
