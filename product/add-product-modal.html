<div id="addProductModal" class="product-modal-overlay">
    <div class="product-modal-content">
        <div class="pm-header">
            <h3>Add New Product</h3>
            <span class="pm-close" id="apmClose">&times;</span>
        </div>
        <div class="pm-body" style="padding-bottom: 0;">
            <form class="apm-form" id="addProductForm" autocomplete="off" style="margin-bottom: 10px;">
                <div class="apm-row">
                    <div class="apm-input-group">
                        <label for="newProductName">Item Name</label>
                        <div class="apm-input-wrapper">
                            <div class="apm-input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="9" cy="21" r="1"></circle>
                                    <circle cx="20" cy="21" r="1"></circle>
                                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                                </svg>
                            </div>
                            <input type="text" id="newProductName" class="apm-input" autocomplete="off"
                                placeholder="e.g. Rice" required>
                        </div>
                    </div>
                </div>

                <div class="apm-row inline-row">
                    <div class="apm-input-group">
                        <label for="newProductPrice">Unit Price (₦)</label>
                        <div class="apm-input-wrapper">
                            <div class="apm-input-icon">
                                <span style="font-weight: bold; font-size: 1.1rem; line-height: 1;">₦</span>
                            </div>
                            <!-- type="number" with precision logic matching the requirement. -->
                            <input type="number" id="newProductPrice" class="apm-input" autocomplete="off"
                                placeholder="400" required min="1" step="0.01">
                        </div>
                    </div>

                    <div class="apm-input-group">
                        <label>Unit</label>
                        <div class="apm-dropdown-wrapper" id="apmUnitWrapper">
                            <div class="apm-input-wrapper">
                                <div class="apm-input-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path
                                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                                        </path>
                                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                                    </svg>
                                </div>
                                <div class="apm-input apm-dropdown-toggle" id="apmUnitToggle">
                                    <span id="apmUnitText" class="truncate">per cup</span>
                                    <span class="dropdown-arrow"><svg xmlns="http://www.w3.org/2000/svg" width="1em"
                                            height="1em" viewBox="0 0 24 24" fill="currentColor">
                                            <path d="M7 10l5 5 5-5z" />
                                        </svg></span>
                                </div>
                            </div>
                            <div class="apm-dropdown-menu" id="apmUnitMenu">
                                <div class="apm-dropdown-option active" data-value="per cup">
                                    per cup <span class="apm-dropdown-check"></span>
                                </div>
                                <div class="apm-dropdown-option" data-value="per kg">
                                    per kg <span class="apm-dropdown-check"></span>
                                </div>
                                <div class="apm-dropdown-option" data-value="per bag">
                                    per bag <span class="apm-dropdown-check"></span>
                                </div>
                                <div class="apm-dropdown-option" data-value="per carton">
                                    per carton <span class="apm-dropdown-check"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Live payout calculation box using product-modal existing highlighted styles -->
                <div class="pm-highlight-item"
                    style="margin-top: 25px; display: flex; flex-direction: column; align-items: center; padding: 20px;">
                    <span class="pm-label" style="margin-bottom: 5px;">Estimated Reward Return</span>
                    <div style="font-size: 1.5rem; font-weight: 700; color: #8b5cf6; margin-top: 4px;"
                        id="apmPayoutValue">₦0 (Payout)</div>
                </div>
            </form>
        </div>
        <div class="pm-footer">
            <button type="button" class="apm-submit-btn" id="apmSubmitBtn">
                <span>Create New Product</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>
    </div>
</div>
