<div class="payout-wrapper">
    <div class="payout-text"></div>
    <div class="user-id-text"></div>
</div>
<div class="dashboard-card">
    <div class="card-item payout-item" id="totalPayoutDisplay">Total reward: ₦0.00</div>
    <div class="card-item spending-item" id="totalSpendingDisplay">Total spending: ₦0.00</div>
</div>
<div class="payout-expiry-notice">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    <span>All reward expires every 31st December</span>
</div>


<div class="sticky-filter-wrapper">
    <div class="payout-label">Reward</div>
    <div class="filter-section">
        <div class="date-selectors">
            <!-- Month Filter Chip -->
            <div class="filter-chip" id="monthChip">
                <svg class="filter-chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
                <span class="filter-chip-label" id="monthChipLabel">All Months</span>
                <svg class="filter-chip-arrow" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7 10l5 5 5-5z" />
                </svg>
            </div>

            <!-- Year Filter Chip -->
            <div class="filter-chip" id="yearChip">
                <svg class="filter-chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                <span class="filter-chip-label" id="yearChipLabel">All Years</span>
                <svg class="filter-chip-arrow" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7 10l5 5 5-5z" />
                </svg>
            </div>

            <!-- Clear Filter Button -->
            <div class="clear-filter-btn" id="clearFilterBtn" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
                <span>Clear</span>
            </div>
        </div>
        <div class="sort-container">
            <div class="sort-btn" id="sortToggle">
                <span class="sort-text">Sort</span>
            </div>
            <div class="sort-dropdown" id="sortDropdown">
                <div class="sort-option active" data-sort="newest">Newest to Oldest<span class="sort-check"></span>
                </div>
                <div class="sort-option" data-sort="oldest">Oldest to Newest<span class="sort-check"></span></div>
                <div class="sort-option" data-sort="highest">Highest to Lowest<span class="sort-check"></span></div>
                <div class="sort-option" data-sort="lowest">Lowest to Highest<span class="sort-check"></span></div>
            </div>
        </div>
    </div>
</div>

<!-- Active Filter Badge -->
<div class="active-filter-badge" id="activeFilterBadge" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
    </svg>
    <span id="activeFilterText">Showing: All</span>
</div>

<div id="dynamicPayoutList" class="dynamic-payout-list">
    <!-- Payout cards injected here by payout.js -->
</div>

<!-- Floating Message Button -->
<div class="payout-message-btn" id="btnPayoutMessage">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail-icon lucide-mail">
        <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7" />
        <rect x="2" y="4" width="20" height="16" rx="2" />
    </svg>
    <span class="payout-message-text">Message</span>
</div>
