<div id="transactionModal" class="transaction-modal-overlay">
    <div class="transaction-modal-content">
        <div class="tm-header">
            <h3>Reward Details</h3>
            <span class="tm-close" id="tmClose">&times;</span>
        </div>
        <div class="tm-body">
            <div class="tm-amount-section">
                <div class="tm-amount-wrapper">
                    <span class="tm-plus">+</span><span class="tm-amount" id="tmAmountValue">0.00</span>
                </div>
                <div class="tm-status">Reward</div>
            </div>

            <div class="tm-details-list">
                <div class="tm-detail-item">
                    <span class="tm-label">Type</span>
                    <span class="tm-value">Reward</span>
                </div>
                <div class="tm-detail-item">
                    <span class="tm-label">Description</span>
                    <span class="tm-value" id="tmDescription">For buying...</span>
                </div>
                <div class="tm-detail-item">
                    <span class="tm-label">Date & Time</span>
                    <span class="tm-value" id="tmDate">mmm. dd | hh:mm am</span>
                </div>
                <div class="tm-detail-item">
                    <span class="tm-label">Transaction ID</span>
                    <span class="tm-value" id="tmTransactionId">TXN-94028591A</span>
                </div>
                <div class="tm-detail-item">
                    <span class="tm-label">Reference</span>
                    <span class="tm-value" id="tmReference">nd-shop-789012345</span>
                </div>
            </div>
        </div>
        <div class="tm-footer">
            <button class="tm-action-btn" id="tmReportBtn">Report Issue</button>
            <button class="tm-action-btn tm-btn-primary download-btn-creative" id="tmDownloadBtn">
                <span class="dl-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </span>
                <span class="dl-text">Download PDF</span>
            </button>
        </div>
    </div>
</div>
