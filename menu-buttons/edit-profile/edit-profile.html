<div class="menu-modal-overlay" id="editProfileModal">
    <div class="edit-profile-modal-content menu-modal-content">
        <div class="menu-modal-header">
            <h3>Edit Profile</h3>
            <span class="m-close" id="editProfileClose">&times;</span>
        </div>
        <div class="menu-modal-body">
            <div class="edit-profile-hero-section">
                <div class="edit-profile-avatar"></div>
                <div class="edit-profile-title"></div>
                <div class="edit-profile-desc">Update your personal information.</div>
            </div>
            <div class="edit-profile-form-area">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="epFirstName" class="m-input" autocomplete="off" autocapitalize="words"
                        value="">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="epLastName" class="m-input" autocomplete="off" autocapitalize="words"
                        value="">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="epAddress" class="m-input" autocomplete="off" autocapitalize="words"
                        value="">
                </div>
                <div class="form-row">
                    <div class="form-group half">
                        <label>State</label>
                        <div class="ep-dropdown-wrapper" id="stateDropdownWrapper">
                            <div class="ep-dropdown-toggle" id="stateToggle">
                                <span class="ep-dropdown-text" id="stateText">Lagos</span>
                                <span class="ep-dropdown-arrow"><svg xmlns="http://www.w3.org/2000/svg" width="1em"
                                        height="1em" viewBox="0 0 24 24" fill="currentColor"
                                        style="vertical-align: middle;">
                                        <path d="M7 10l5 5 5-5z" />
                                    </svg></span>
                            </div>
                            <div class="ep-dropdown-menu" id="stateDropdown"></div>
                        </div>
                    </div>
                    <div class="form-group half">
                        <label>LGA</label>
                        <div class="ep-dropdown-wrapper disabled" id="lgaDropdownWrapper">
                            <div class="ep-dropdown-toggle" id="lgaToggle">
                                <span class="ep-dropdown-text" id="lgaText">Select LGA</span>
                                <span class="ep-dropdown-arrow"><svg xmlns="http://www.w3.org/2000/svg" width="1em"
                                        height="1em" viewBox="0 0 24 24" fill="currentColor"
                                        style="vertical-align: middle;">
                                        <path d="M7 10l5 5 5-5z" />
                                    </svg></span>
                            </div>
                            <div class="ep-dropdown-menu" id="lgaDropdown"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="menu-modal-footer">
            <button class="m-action-btn" id="editProfileCancel">Cancel</button>
            <button class="m-action-btn m-btn-primary" id="editProfileSave">Update Information</button>
        </div>
    </div>
</div>
