<div class="menu-modal-overlay" id="appearanceModal">
    <div class="appearance-modal-content menu-modal-content">
        <div class="menu-modal-header">
            <h3>Appearance</h3>
            <span class="m-close" id="appearanceClose">&times;</span>
        </div>
        <div class="menu-modal-body">
            <div class="appearance-hero-section">
                <div class="appearance-title">Choose Theme</div>
                <div class="appearance-desc">Customize the look and feel of <span class="dynamic-shop-name">nd shop</span>.</div>
            </div>

            <div class="theme-options">
                <label class="theme-option">
                    <input type="radio" name="theme-choice" value="system" checked>
                    <div class="theme-card">
                        <div class="theme-visual system-visual">
                            <div class="tv-half light-half"></div>
                            <div class="tv-half dark-half"></div>
                        </div>
                        <span class="theme-label">System Default</span>
                        <div class="theme-radio-btn"></div>
                    </div>
                </label>

                <label class="theme-option">
                    <input type="radio" name="theme-choice" value="light">
                    <div class="theme-card">
                        <div class="theme-visual light-visual">
                            <div class="tv-bar"></div>
                            <div class="tv-content"></div>
                        </div>
                        <span class="theme-label">Light Mode</span>
                        <div class="theme-radio-btn"></div>
                    </div>
                </label>

                <label class="theme-option">
                    <input type="radio" name="theme-choice" value="dark">
                    <div class="theme-card">
                        <div class="theme-visual dark-visual">
                            <div class="tv-bar"></div>
                            <div class="tv-content"></div>
                        </div>
                        <span class="theme-label">Dark Mode</span>
                        <div class="theme-radio-btn"></div>
                    </div>
                </label>
            </div>
        </div>
    </div>
</div>
