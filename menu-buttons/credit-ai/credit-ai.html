<div class="admin-modal-overlay" id="aiChatModalOverlay">
    <div class="admin-modal-content full-page ai-chat-modal">
        
        <!-- Chat History Modal -->
        <div class="ai-history-modal-overlay" id="aiHistoryModalOverlay" style="display: none;">
            <div class="ai-history-modal">
                <div class="ai-history-modal-header">
                    <h3>Chat History</h3>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <button id="aiNewChatSidebarBtn" class="ai-sidebar-new-btn" title="New Chat">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                        <button class="ai-history-close-btn" id="aiHistoryCloseBtn">&times;</button>
                    </div>
                </div>
                <div class="sidebar-search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none;">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="aiSidebarSearch" placeholder="Search chats..." style="padding-left: 32px;">
                </div>
                <div class="sidebar-thread-list" id="aiSidebarThreadList">
                    <!-- Thread items populated by JS -->
                </div>
            </div>
        </div>

        <!-- Main Chat Context -->
        <div class="ai-main-area">
            <div class="admin-modal-header">
                <h2 class="admin-modal-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" style="color: #4338ca;">
                        <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                        <circle cx="12" cy="5" r="2"></circle>
                        <path d="M12 7v4"></path>
                        <line x1="8" y1="16" x2="8" y2="16"></line>
                        <line x1="16" y1="16" x2="16" y2="16"></line>
                    </svg>
                    AI Shopping Assistant
                </h2>
                <div style="display: flex; gap: 8px;">
                    <button class="ai-header-btn" id="aiToggleHistoryBtn" title="Chat History" style="color: #64748b;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                    </button>
                    <button class="admin-modal-close" id="closeUserAiModal">&times;</button>
                </div>
            </div>

            <div class="active-chat-search" style="padding: 8px 16px; z-index: 15; position: relative;">
                <div style="position: relative; display: flex; align-items: center;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none;">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="aiActiveChatSearch" placeholder="Search in this chat..." style="width: 100%; border-radius: 8px; padding: 8px 36px; outline: none; font-size: 13px; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: border-color 0.2s;">
                    <button id="aiActiveChatSearchClear" style="display: none; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #94a3b8; cursor: pointer; padding: 4px; align-items: center; justify-content: center; transition: color 0.2s;" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#94a3b8'">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>

            <!-- Pinned Messages Panel (hidden by default) -->
            <div class="ai-pinned-panel" id="aiPinnedPanel" style="display: none; padding: 0; background: #f0f9ff; border-bottom: 1px solid #e0f2fe; z-index: 10; position: relative;">
                <!-- Rendered via JS -->
            </div>

            <div class="ai-chat-body" id="aiChatHistoryContainer">
                <div class="ai-message system-msg">
                    <div class="bubble">Hello! I am your AI Shopping Assistant. How can I help you find products or assist with your purchases? Feel free to upload an image!</div>
                </div>
            </div>

            <div class="ai-chat-input-area" style="position: relative;">
                <button id="aiJumpToBottomBtn" class="ai-jump-bottom-btn" style="display: none; position: absolute; top: -50px; right: 24px; background: white; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 50%; width: 40px; height: 40px; align-items: center; justify-content: center; cursor: pointer; z-index: 50; color: #8b5cf6; transition: 0.2s;">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
                </button>

                <div class="ai-image-preview-container" id="aiImagePreviewContainer" style="display: none;">
                    <img id="aiImagePreview" src="" alt="Selected Image" style="cursor: pointer;" onclick="window._openAiImagePreview(this.src)">
                    <button class="remove-image-btn" id="aiRemoveImageBtn">&times;</button>
                </div>
                
                <div class="ai-input-row" style="position: relative;">
                    <button type="button" class="ai-attach-btn" id="aiAttachMenuBtn" title="Attach">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                        </svg>
                    </button>
                    
                    <div id="aiAttachMenu" style="display: none; position: absolute; bottom: 60px; left: 0; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 8px; flex-direction: column; gap: 4px; z-index: 100; border: 1px solid #e2e8f0; min-width: 150px;">
                        <label for="aiImageUploadCamera" style="display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; border-radius: 8px; font-size: 14px; font-weight: 500; color: #334155; transition: background 0.2s;">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                            Take Photo
                        </label>
                        <input type="file" id="aiImageUploadCamera" accept="image/*" capture="environment" style="display: none;">
                        
                        <label for="aiImageUploadGallery" style="display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; border-radius: 8px; font-size: 14px; font-weight: 500; color: #334155; transition: background 0.2s;">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            Upload Image
                        </label>
                        <input type="file" id="aiImageUploadGallery" accept="image/*" style="display: none;">
                    </div>

                    <textarea class="ai-text-field" id="aiChatInput" placeholder="Type instructions or details..." rows="1" style="resize: none; overflow: hidden; padding-top: 14px; padding-bottom: 14px;"></textarea>
                    
                    <button class="ai-send-btn" id="aiSendBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- Image Editor Overlay -->
            <div class="ai-cropper-overlay" id="aiCropperOverlay" style="display: none;">
                <div class="ai-cropper-container">
                    <div class="ai-cropper-image-wrapper">
                        <img id="aiCropperImage" src="" alt="To crop">
                    </div>
                    <div class="ai-cropper-actions">
                        <button id="aiCropCancelBtn" class="crop-action-btn cancel-btn" title="Cancel">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                            <span>Cancel</span>
                        </button>
                        <button id="aiCropUndoBtn" class="crop-action-btn" title="Undo">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 14 4 9 9 4"></polyline>
                                <path d="M20 20v-7a4 4 0 0 0-4-4H4"></path>
                            </svg>
                            <span>Undo</span>
                        </button>
                        <button id="aiCropRedoBtn" class="crop-action-btn" title="Redo">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="15 14 20 9 15 4"></polyline>
                                <path d="M4 20v-7a4 4 0 0 1 4-4h12"></path>
                            </svg>
                            <span>Redo</span>
                        </button>
                        <button id="aiCropRotateLeftBtn" class="crop-action-btn" title="Rotate Left">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                <polyline points="1 4 1 10 7 10"></polyline>
                                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                            </svg>
                            <span>Left</span>
                        </button>
                        <button id="aiCropRotateRightBtn" class="crop-action-btn" title="Rotate Right">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                            </svg>
                            <span>Right</span>
                        </button>
                        <button id="aiCropResetBtn" class="crop-action-btn" title="Reset">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-refresh-ccw-icon lucide-refresh-ccw"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                            <span>Reset</span>
                        </button>
                        <button id="aiCropConfirmBtn" class="crop-action-btn confirm-btn" title="Send to AI">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                            <span>Done</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Rename Chat Modal -->
<div class="admin-modal-overlay" id="aiRenameModal">
    <div class="admin-modal-content" style="max-width: 380px;" id="aiRenameBox">
        <div class="admin-modal-header">
            <h3>Rename Chat</h3>
            <button class="admin-modal-close" id="aiRenameCloseBtn">✕</button>
        </div>
        <div class="admin-modal-body">
            <div class="form-group" style="margin-bottom: 24px;">
                <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase;">New Title</label>
                <input type="text" id="aiRenameInput" style="width: 100%; padding: 14px 18px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; outline: none; background: #f8fafc; font-family: inherit; color: #1e293b;" placeholder="Enter new title">
            </div>
            <button class="admin-modern-btn primary" id="aiRenameSaveBtn" style="width: 100%;">Save Title</button>
        </div>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div class="admin-modal-overlay" id="aiDeleteModal">
    <div class="admin-modal-content" style="max-width: 380px;" id="aiDeleteBox">
        <div class="admin-modal-header" style="justify-content: center; border-bottom: none; padding-top: 30px;">
            <div style="width: 64px; height: 64px; background: #fef2f2; color: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(239, 68, 68, 0.1);">
                <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"></path>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
            </div>
        </div>
        <div class="admin-modal-body" style="text-align: center; padding-top: 10px;">
            <h3 style="margin: 0 0 10px 0; font-size: 1.4rem; color: #1e293b; font-weight: 800;">Delete Chat?</h3>
            <p style="margin: 0 0 24px 0; color: #64748b; font-size: 0.95rem; line-height: 1.5; font-weight: 500;">Are you sure you want to delete this chat? This cannot be undone.</p>
            <div style="display: flex; gap: 12px;">
                <button id="aiDeleteCancelBtn" class="admin-modern-btn" style="flex: 1; background: #f1f5f9; color: #64748b;">Cancel</button>
                <button id="aiDeleteConfirmBtn" class="admin-modern-btn danger" style="flex: 1;">Delete</button>
            </div>
        </div>
    </div>
</div>
