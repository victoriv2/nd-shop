<!-- Pay Debt Modal Overlay -->
<div id="payDebtModal" class="menu-modal-overlay">
    <div class="pay-debt-modal-content">
        <div class="pay-debt-header">
            <h3 style="flex:1;">Pay Your Debt</h3>
            <button onclick="openDebtHistory()" style="background: none; border: none; color: #8b5cf6; font-weight: 600; font-size: 0.85rem; padding: 4px 8px; cursor: pointer;">History</button>
            <span class="close-menu-modal" onclick="closePayDebtModal()" style="margin-left: 10px;">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </span>
        </div>
        
        <div class="pay-debt-body">
            <!-- Bank Details -->
            <div class="bank-info-card">
                <span class="bank-info-label">Pay To Account</span>
                <div class="bank-account-num"></div>
                <div class="bank-account-name"></div>
                <div class="bank-name"></div>
            </div>

            <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 0.95rem; line-height: 1.5;">
                Please transfer the amount you wish to repay to the account above. Upload a picture of the transfer receipt below for automatic processing.
            </p>

            <!-- File Upload -->
            <div class="upload-section">
                <label class="upload-label">Transfer Receipt <span style="color:#ef4444">*</span></label>
                <div class="upload-area" id="payDebtUploadArea">
                    <svg class="upload-icon" viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <div class="upload-text" style="margin-bottom: 12px;">Choose an option below</div>
                    
                    <div class="upload-actions" style="display: flex; gap: 10px; justify-content: center; position: relative; z-index: 10;">
                        <button type="button" onclick="document.getElementById('payDebtCameraInput').click()" style="padding: 8px 16px; background: #8b5cf6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 6px;">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg> Camera
                        </button>
                        <button type="button" onclick="document.getElementById('payDebtGalleryInput').click()" style="padding: 8px 16px; background: rgba(27, 38, 59, 0.1); color: #8b5cf6; border: 1px solid #8b5cf6; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 6px;">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> Gallery
                        </button>
                    </div>

                    <img id="payDebtImagePreview" src="" alt="Preview" style="margin-top: 15px;">
                    <button id="payDebtRemoveImg">&times;</button>
                    <!-- Inputs explicitly set to allow images and camera -->
                    <input type="file" id="payDebtCameraInput" accept="image/*" capture="environment" style="display: none;">
                    <input type="file" id="payDebtGalleryInput" accept="image/*" style="display: none;">
                </div>
            </div>

            <!-- Optional Note -->
            <div class="note-section">
                <label class="upload-label" for="payDebtNote">Additional Note (Optional)</label>
                <textarea id="payDebtNote" placeholder="E.g., Paying for yesterday's balance..."></textarea>
            </div>
        </div>

        <div class="pay-debt-actions">
            <button id="submitPayDebtBtn">
                <span class="btn-text">Submit Payment</span>
                <span class="loader"></span>
            </button>
        </div>
    </div>
</div>

<!-- Pay Debt Image Cropper Overlay -->
<div class="pd-cropper-overlay" id="pdCropperOverlay" style="display: none;">
    <div class="pd-cropper-container">
        <div class="pd-cropper-image-wrapper">
            <img id="pdCropperImage" src="" alt="Edit receipt">
        </div>
        <div class="pd-cropper-actions">
            <button class="crop-action-btn cancel-btn" id="pdCropCancelBtn" title="Cancel">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
                <span>Cancel</span>
            </button>
            <button class="crop-action-btn" id="pdCropRotateLeftBtn" title="Rotate Left">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                </svg>
                <span>Left</span>
            </button>
            <button class="crop-action-btn" id="pdCropRotateRightBtn" title="Rotate Right">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                <span>Right</span>
            </button>
            <button class="crop-action-btn" id="pdCropUndoBtn" title="Undo">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                <span>Undo</span>
            </button>
            <button class="crop-action-btn" id="pdCropRedoBtn" title="Redo">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
                <span>Redo</span>
            </button>
            <button class="crop-action-btn" id="pdCropResetBtn" title="Reset">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                <span>Reset</span>
            </button>
            <button class="crop-action-btn confirm-btn" id="pdCropConfirmBtn" title="Confirm">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span>Done</span>
            </button>
        </div>
    </div>
</div>

<!-- Debt History Full Page Overlay -->
<div id="pdHistoryOverlay" style="display: none; background: #f8fafc; z-index: 100000; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; overflow-y: auto;">
    <div style="padding: 20px;">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
            <button onclick="closeDebtHistory()" style="background: white; border: 1px solid #e2e8f0; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); color: #333; cursor: pointer;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <h3 style="margin: 0; font-size: 1.2rem; color: #1e293b; font-weight: 700;">Debt History</h3>
            <div style="width: 40px;"></div> <!-- Spacer -->
        </div>

        <div id="pdHistoryList" style="display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px;">
            <!-- History Items Injected Here -->
        </div>
    </div>
</div>
