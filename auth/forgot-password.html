<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nd shop - Reset Password</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="auth.css">

    <!-- Dark Mode Theme System -->
    <link rel="stylesheet" href="../dark-mode/core/variables.css">
    <link rel="stylesheet" href="../dark-mode/core/base.css">
    <link rel="stylesheet" href="../dark-mode/components/auth.css">
    <script src="../dark-mode/theme-manager.js"></script>
    <script src="../custom-alert.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>

    <style>
        .fp-track {
            display: flex;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .fp-step {
            flex: 0 0 100%;
            width: 100%;
            transform: translateX(calc(-100% * var(--current-fp-step, 0)));
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
        }

        .fp-step.active-step {
            opacity: 1;
            pointer-events: auto;
        }

        .fp-header-icon {
            font-size: 2.5rem;
            color: #8b5cf6;
            background-color: rgba(27, 38, 59, 0.1);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 10px;
        }

        .auth-header {
            margin-bottom: 15px !important;
        }

        .auth-form {
            gap: 10px !important;
        }

        .auth-footer {
            margin-top: 15px !important;
            padding-top: 15px !important;
        }
    </style>
</head>

<body class="auth-body">
    <div class="auth-bg-circle circle-1"></div>
    <div class="auth-bg-circle circle-2"></div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo-wrapper">
                <div class="fp-header-icon" id="fpIcon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
            </div>
            <h1 class="auth-title" id="fpTitle">Reset Password</h1>
            <p class="auth-subtitle" id="fpSubtitle">Enter the email or phone number associated with your account to receive a reset code.</p>
        </div>

        <form class="auth-form" id="forgotPasswordForm" autocomplete="off">
            <div class="fp-track" id="fpTrack">

                <!-- STEP 1: Enter Email or Phone -->
                <div class="fp-step active-step" id="fp-step-0">
                    <div class="auth-input-group">
                        <label for="fpIdentifier">Email or Phone Number</label>
                        <div class="input-wrapper">
                            <div class="input-icon" id="fpIdentifierIcon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                    <polyline points="22,6 12,13 2,6" />
                                </svg>
                            </div>
                            <input type="text" id="fpIdentifier" class="auth-input" placeholder="e.g. hello@nd.shop or 08012345678" required>
                        </div>
                    </div>
                </div>

                <!-- STEP 2: Verify Code -->
                <div class="fp-step" id="fp-step-1">
                    <div class="auth-otp-container" style="margin: 0 0 10px 0;">
                        <input type="text" class="auth-otp-input fp-otp" autocomplete="off" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="auth-otp-input fp-otp" autocomplete="off" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="auth-otp-input fp-otp" autocomplete="off" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="auth-otp-input fp-otp" autocomplete="off" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="auth-otp-input fp-otp" autocomplete="off" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="auth-otp-input fp-otp" autocomplete="off" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                    </div>
                    <div style="text-align: center; margin-bottom: 10px;">
                        <a href="#" style="font-size: 0.85rem; font-weight: 600; color: #8b5cf6; text-decoration: none;" id="fpResend">Resend Code</a>
                    </div>
                </div>

                <!-- STEP 3: New Password -->
                <div class="fp-step" id="fp-step-2">
                    <div class="auth-input-group">
                        <label for="fpNewPassword">New Password</label>
                        <div class="input-wrapper">
                            <div class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                                </svg>
                            </div>
                            <input type="password" id="fpNewPassword" class="auth-input" placeholder="Create new password" required>
                            <button type="button" class="password-toggle" data-target="fpNewPassword">
                                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></svg>
                                <svg class="eye-closed hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" /><line x1="1" y1="1" x2="23" y2="23" /></svg>
                            </button>
                        </div>
                    </div>
                </div>

            </div>

            <div class="wizard-actions">
                <button type="button" class="auth-secondary-btn hidden" id="fpBtnBack">Back</button>
                <button type="button" class="auth-submit-btn" id="fpBtnNext">
                    <span>Send Code</span>
                </button>
            </div>
        </form>

        <div class="auth-footer">
            <p>Remembered your password? <a href="login.html">Sign In</a></p>
        </div>
    </div>

    <!-- Auth Method Modal (Email vs SMS) -->
    <div class="auth-method-modal-overlay" id="authMethodModal">
        <div class="auth-method-modal">
            <div class="auth-method-header">
                <div class="auth-method-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <h3>Password Recovery</h3>
                <p>How would you like to receive your 6-digit recovery code?</p>
            </div>
            
            <div class="auth-method-options">
                <button type="button" class="auth-method-btn" onclick="selectAuthMethod('email')" id="btnMethodEmail">
                    <div class="method-icon email">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </div>
                    <div class="method-text">
                        <span class="method-title">Send to Email</span>
                        <span class="method-desc">Get a code sent to your inbox</span>
                    </div>
                </button>

                <button type="button" class="auth-method-btn" onclick="selectAuthMethod('sms')" id="btnMethodSms">
                    <div class="method-icon sms">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    </div>
                    <div class="method-text">
                        <span class="method-title">Send via SMS</span>
                        <span class="method-desc">Get a text message to your phone</span>
                    </div>
                </button>
            </div>
            
            <button type="button" class="auth-method-cancel" onclick="closeAuthMethodModal()">Cancel</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleButtons = document.querySelectorAll('.password-toggle');
            toggleButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetId = btn.getAttribute('data-target');
                    const passwordInput = document.getElementById(targetId);
                    const eyeOpen = btn.querySelector('.eye-open');
                    const eyeClosed = btn.querySelector('.eye-closed');

                    if (passwordInput && passwordInput.type === 'password') {
                        passwordInput.type = 'text';
                        eyeOpen.classList.add('hidden');
                        eyeClosed.classList.remove('hidden');
                    } else if (passwordInput) {
                        passwordInput.type = 'password';
                        eyeClosed.classList.add('hidden');
                        eyeOpen.classList.remove('hidden');
                    }
                });
            });

            const fpTrack = document.getElementById('fpTrack');
            const fpSteps = document.querySelectorAll('.fp-step');
            const btnNext = document.getElementById('fpBtnNext');
            const btnBack = document.getElementById('fpBtnBack');
            const nextText = btnNext.querySelector('span');
            const title = document.getElementById('fpTitle');
            const subtitle = document.getElementById('fpSubtitle');
            const icon = document.getElementById('fpIcon');

            let currentStep = 0;

            // Auto-detect email vs phone
            function isPhone(val) {
                const cleaned = val.replace(/[\s\-\(\)]/g, '');
                return /^\+?\d{7,}$/.test(cleaned);
            }

            const fpIdentifierInput = document.getElementById('fpIdentifier');
            const fpIdentifierIcon = document.getElementById('fpIdentifierIcon');
            const emailSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>';
            const phoneSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';

            if (fpIdentifierInput && fpIdentifierIcon) {
                fpIdentifierInput.addEventListener('input', () => {
                    const val = fpIdentifierInput.value.trim();
                    if (val && isPhone(val)) {
                        fpIdentifierIcon.innerHTML = phoneSvg;
                    } else {
                        fpIdentifierIcon.innerHTML = emailSvg;
                    }
                });
            }

            function updateWizard() {
                fpTrack.style.setProperty('--current-fp-step', currentStep);

                fpSteps.forEach((step, index) => {
                    if (index === currentStep) step.classList.add('active-step');
                    else step.classList.remove('active-step');
                });

                btnBack.classList.toggle('hidden', currentStep === 0);

                const identVal = fpIdentifierInput ? fpIdentifierInput.value.trim() : '';
                const usingPhone = isPhone(identVal);

                if (currentStep === 0) {
                    title.textContent = 'Reset Password';
                    subtitle.textContent = 'Enter the email or phone number associated with your account to receive a reset code.';
                    btnNext.querySelector('span').textContent = 'Send Code';
                    icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>';
                } else if (currentStep === 1) {
                    title.textContent = window.fpRecoveryMethod === 'sms' ? 'Verify Phone' : 'Verify Email';
                    subtitle.textContent = window.fpRecoveryMethod === 'sms'
                        ? 'Please enter the 6-digit code sent to your phone number.'
                        : 'Please enter the 6-digit code sent to your email address.';
                    btnNext.querySelector('span').textContent = 'Verify Code';
                    icon.innerHTML = window.fpRecoveryMethod === 'sms'
                        ? '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>'
                        : '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>';
                    setTimeout(() => document.querySelector('.fp-otp').focus(), 300);
                } else if (currentStep === 2) {
                    title.textContent = 'New Password';
                    subtitle.textContent = 'Create a secure new password for your account.';
                    btnNext.querySelector('span').textContent = 'Update Password';
                    icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path><circle cx="12" cy="16" r="1"></circle><path d="M12 17v2"></path></svg>';
                }
            }

            window.closeAuthMethodModal = function() {
                const modal = document.getElementById('authMethodModal');
                if (modal) modal.classList.remove('show');
            };

            window.selectAuthMethod = async function(method) {
                const identifier = fpIdentifierInput.value.trim();
                
                const emailBtn = document.getElementById('btnMethodEmail');
                const smsBtn = document.getElementById('btnMethodSms');
                if (emailBtn) emailBtn.disabled = true;
                if (smsBtn) smsBtn.disabled = true;
                
                const selectedBtn = method === 'email' ? emailBtn : smsBtn;
                const oldText = selectedBtn ? selectedBtn.innerHTML : '';
                if (selectedBtn) {
                    selectedBtn.innerHTML = `
                        <div style="display:flex; justify-content:center; align-items:center; width:100%;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;">
                                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                            </svg>
                            <span style="margin-left: 10px; font-weight:bold;">Sending...</span>
                        </div>
                    `;
                }

                try {
                    let error;
                    const { data: usersData } = await window.supabaseClient.from('profiles').select('*');
                    const users = usersData || [];
                    let resolvedEmail = identifier.toLowerCase();
                    let resolvedPhone = identifier;

                    if (method === 'sms') {
                        if (identifier.includes('@')) {
                            const matchedUser = users.find(u => u.email && u.email.toLowerCase() === identifier.toLowerCase());
                            if (matchedUser && matchedUser.phone) resolvedPhone = matchedUser.phone;
                        }
                        let phone = resolvedPhone;
                        if (phone.startsWith('0')) phone = '+234' + phone.substring(1);
                        else if (!phone.startsWith('+')) phone = '+234' + phone;

                        // Save this resolved info so we can verify it later
                        window.fpResolvedPhone = phone;

                        const { error: smsError } = await window.supabaseClient.auth.signInWithOtp({ phone });
                        error = smsError;
                    } else {
                        if (!identifier.includes('@')) {
                            let searchPhone = identifier;
                            if (searchPhone.startsWith('0')) searchPhone = '+234' + searchPhone.substring(1);
                            else if (!searchPhone.startsWith('+')) searchPhone = '+234' + searchPhone;
                            const matchedUser = users.find(u => u.phone === searchPhone);
                            if (matchedUser && matchedUser.email) resolvedEmail = matchedUser.email;
                        }

                        // Save this resolved info so we can verify it later
                        window.fpResolvedEmail = resolvedEmail;

                        const { error: emailError } = await window.supabaseClient.auth.resetPasswordForEmail(resolvedEmail);
                        error = emailError;
                    }

                    if (error) throw error;

                    window.fpRecoveryMethod = method;
                    closeAuthMethodModal();
                    
                    currentStep++;
                    updateWizard();

                } catch (err) {
                    console.error(err);
                    customAlert(err.message, true);
                } finally {
                    if (selectedBtn) selectedBtn.innerHTML = oldText;
                    if (emailBtn) emailBtn.disabled = false;
                    if (smsBtn) smsBtn.disabled = false;
                }
            };

            btnNext.addEventListener('click', async () => {
                if (currentStep === 0) {
                    const identifier = fpIdentifierInput.value.trim();
                    if (!identifier) {
                        customAlert('Please enter your email or phone number.', true);
                        return;
                    }
                    
                    document.getElementById('authMethodModal').classList.add('show');
                    
                } else if (currentStep === 1) {
                    const otps = Array.from(document.querySelectorAll('.fp-otp')).map(i => i.value).join('');
                    if (otps.length < 6) {
                        customAlert('Please enter the 6-digit code.', true);
                        return;
                    }

                    const originalHtml = btnNext.innerHTML;
                    btnNext.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg><span>Verifying...</span>';
                    
                    try {
                        let verifyPayload = {};
                        const method = window.fpRecoveryMethod || 'email';
                        const identifier = fpIdentifierInput.value.trim();

                        if (method === 'sms') {
                            verifyPayload = { phone: window.fpResolvedPhone || identifier, token: otps, type: 'sms' };
                        } else {
                            verifyPayload = { email: window.fpResolvedEmail || identifier, token: otps, type: 'recovery' };
                        }

                        const { error } = await window.supabaseClient.auth.verifyOtp(verifyPayload);
                        if (error) throw error;

                        btnNext.innerHTML = originalHtml;
                        currentStep++;
                        updateWizard();
                    } catch (err) {
                        console.error(err);
                        customAlert(err.message, true);
                        btnNext.innerHTML = originalHtml;
                    }
                } else if (currentStep === 2) {
                    const newPass = document.getElementById('fpNewPassword').value;
                    if (!newPass || newPass.length < 6) {
                        customAlert('Please enter a new password (min 6 characters).', true);
                        return;
                    }

                    const originalHtml = btnNext.innerHTML;
                    btnNext.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg><span>Updating...</span>';
                    
                    try {
                        const { error } = await window.supabaseClient.auth.updateUser({ password: newPass });
                        if (error) throw error;

                        btnNext.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span>Success!</span>';
                        btnNext.style.backgroundColor = '#8b5cf6';
                        
                        await window.supabaseClient.auth.signOut();
                        
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 1500);
                    } catch (err) {
                        console.error(err);
                        customAlert(err.message, true);
                        btnNext.innerHTML = originalHtml;
                    }
                }
            });

            btnBack.addEventListener('click', () => {
                if (currentStep > 0) {
                    currentStep--;
                    updateWizard();
                }
            });

            // OTP Inputs logic
            const otpInputs = document.querySelectorAll('.fp-otp');
            otpInputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.target.value.length > 1) e.target.value = e.target.value.slice(-1);
                    if (e.target.value && index < otpInputs.length - 1) otpInputs[index + 1].focus();
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) otpInputs[index - 1].focus();
                });
            });

            const resendLink = document.getElementById('fpResend');
            let resendCooldown = 0;

            if (resendLink) {
                resendLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (resendCooldown > 0) return;

                    const identVal = fpIdentifierInput ? fpIdentifierInput.value.trim() : '';
                    const msg = isPhone(identVal)
                        ? 'A new code has been sent to your phone number.'
                        : 'A new code has been sent to your email.';
                    customAlert(msg);

                    // Start 60s Cooldown
                    resendCooldown = 60;
                    resendLink.style.opacity = '0.5';
                    resendLink.style.cursor = 'not-allowed';
                    resendLink.textContent = `Resend Code (60s)`;

                    const timer = setInterval(() => {
                        resendCooldown--;
                        if (resendCooldown <= 0) {
                            clearInterval(timer);
                            resendLink.style.opacity = '1';
                            resendLink.style.cursor = 'pointer';
                            resendLink.textContent = 'Resend Code';
                        } else {
                            resendLink.textContent = `Resend Code (${resendCooldown}s)`;
                        }
                    }, 1000);
                });
            }
        });
    </script>
</body>
</html>
