<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nd shop - Reset Password</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="auth.css">

    <!-- Dark Mode Theme System -->
    <link rel="stylesheet" href="../dark-mode/core/variables.css">
    <link rel="stylesheet" href="../dark-mode/core/base.css">
    <link rel="stylesheet" href="../dark-mode/components/auth.css">
    <script src="../dark-mode/theme-manager.js"></script>
    <script src="../global-fixes.js"></script>
    <script src="../custom-alert.js"></script>

    <style>
        .fp-track {
            display: flex;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .fp-step {
            flex: 0 0 100%;
            width: 100%;
            transform: translateX(calc(-100% * var(--current-fp-step, 0)));
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
        }

        .fp-step.active-step {
            opacity: 1;
            pointer-events: auto;
        }

        .fp-header-icon {
            font-size: 2.5rem;
            color: #6366f1;
            background-color: rgba(27, 38, 59, 0.1);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 10px;
        }

        .auth-header {
            margin-bottom: 15px !important;
        }

        .auth-form {
            gap: 10px !important;
        }

        .auth-footer {
            margin-top: 15px !important;
            padding-top: 15px !important;
        }
    </style>
</head>

<body class="auth-body">
    <div class="auth-bg-circle circle-1"></div>
    <div class="auth-bg-circle circle-2"></div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo-wrapper">
                <div class="fp-header-icon" id="fpIcon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
            </div>
            <h1 class="auth-title" id="fpTitle">Reset Password</h1>
            <p class="auth-subtitle" id="fpSubtitle">Enter the email or phone number associated with your account to receive a reset code.</p>
        </div>

        <form class="auth-form" id="forgotPasswordForm" autocomplete="off">
            <div class="fp-track" id="fpTrack">

                <!-- STEP 1: Enter Email or Phone -->
                <div class="fp-step active-step" id="fp-step-0">
                    <div class="auth-input-group">
                        <label for="fpIdentifier">Email or Phone Number</label>
                        <div class="input-wrapper">
                            <div class="input-icon" id="fpIdentifierIcon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                    <polyline points="22,6 12,13 2,6" />
                                </svg>
                            </div>
                            <input type="text" id="fpIdentifier" class="auth-input" placeholder="e.g. hello@nd.shop or 08012345678" required>
                        </div>
                    </div>
                </div>

                <!-- STEP 2: Verify Code -->
                <div class="fp-step" id="fp-step-1">
                    <div class="auth-otp-container" style="margin: 0 0 10px 0;">
                        <input type="text" class="auth-otp-input fp-otp" autocomplete="off" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="auth-otp-input fp-otp" autocomplete="off" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="auth-otp-input fp-otp" autocomplete="off" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                        <input type="text" class="auth-otp-input fp-otp" autocomplete="off" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                    </div>
                    <div style="text-align: center; margin-bottom: 10px;">
                        <a href="#" style="font-size: 0.85rem; font-weight: 600; color: #6366f1; text-decoration: none;" id="fpResend">Resend Code</a>
                    </div>
                </div>

                <!-- STEP 3: New Password -->
                <div class="fp-step" id="fp-step-2">
                    <div class="auth-input-group">
                        <label for="fpNewPassword">New Password</label>
                        <div class="input-wrapper">
                            <div class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                                </svg>
                            </div>
                            <input type="password" id="fpNewPassword" class="auth-input" placeholder="Create new password" required>
                            <button type="button" class="password-toggle" data-target="fpNewPassword">
                                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></svg>
                                <svg class="eye-closed hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" /><line x1="1" y1="1" x2="23" y2="23" /></svg>
                            </button>
                        </div>
                    </div>
                </div>

            </div>

            <div class="wizard-actions">
                <button type="button" class="auth-secondary-btn hidden" id="fpBtnBack">Back</button>
                <button type="button" class="auth-submit-btn" id="fpBtnNext">
                    <span>Send Code</span>
                </button>
            </div>
        </form>

        <div class="auth-footer">
            <p>Remembered your password? <a href="login.html">Sign In</a></p>
        </div>
    </div>

    <!-- OTP Method Selection Modal for Forgot Password -->
    <div class="auth-modal-overlay" id="fpMethodModal" style="z-index: 9999;">
        <div class="auth-modal-content" style="max-width: 400px; text-align: center; padding: 0; border-radius: 20px; overflow: hidden;">
            <div class="auth-modal-header" style="justify-content: center; padding: 24px 24px 0; border-bottom: none; position: relative;">
                <div style="font-size: 2rem; color: #6366f1; background: rgba(99,102,241,0.1); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <h3 style="font-size: 1.2rem; margin: 0;">Choose Delivery Method</h3>
                <p style="color: #64748b; font-size: 0.9rem; margin: 6px 0 0;">Where would you like to receive your 4-digit code?</p>
                <span id="fpMethodModalClose" style="position: absolute; right: 16px; top: 16px; cursor: pointer; font-size: 1.4rem; color: #94a3b8; line-height: 1;">&times;</span>
            </div>
            <div style="padding: 20px 24px 24px; display: flex; flex-direction: column; gap: 12px; text-align: left;">
                <label class="verify-method-label" style="justify-content: flex-start; padding: 15px; border: 1px solid var(--border-color, #e2e8f0); border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px;">
                    <input type="radio" name="fpModalVerifyMethod" class="verify-method-radio" value="email" checked>
                    <div class="verify-method-square">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <div>
                        <strong style="display: block; color: #1e293b; font-weight:700;">Email</strong>
                        <span style="font-size: 0.8rem; color: #64748b; font-weight: normal;">Code sent to your email inbox</span>
                    </div>
                </label>
                <label class="verify-method-label" style="justify-content: flex-start; padding: 15px; border: 1px solid var(--border-color, #e2e8f0); border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px;">
                    <input type="radio" name="fpModalVerifyMethod" class="verify-method-radio" value="sms">
                    <div class="verify-method-square">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <div>
                        <strong style="display: block; color: #1e293b; font-weight:700;">SMS</strong>
                        <span style="font-size: 0.8rem; color: #64748b; font-weight: normal;">Code sent as a text message</span>
                    </div>
                </label>
                <button type="button" id="fpBtnSendOtp" class="auth-submit-btn" style="margin-top: 15px; width: 100%;">
                    <span>Send Code</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleButtons = document.querySelectorAll('.password-toggle');
            toggleButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetId = btn.getAttribute('data-target');
                    const passwordInput = document.getElementById(targetId);
                    const eyeOpen = btn.querySelector('.eye-open');
                    const eyeClosed = btn.querySelector('.eye-closed');

                    if (passwordInput && passwordInput.type === 'password') {
                        passwordInput.type = 'text';
                        eyeOpen.classList.add('hidden');
                        eyeClosed.classList.remove('hidden');
                    } else if (passwordInput) {
                        passwordInput.type = 'password';
                        eyeClosed.classList.add('hidden');
                        eyeOpen.classList.remove('hidden');
                    }
                });
            });

            const fpTrack = document.getElementById('fpTrack');
            const fpSteps = document.querySelectorAll('.fp-step');
            const btnNext = document.getElementById('fpBtnNext');
            const btnBack = document.getElementById('fpBtnBack');
            const title = document.getElementById('fpTitle');
            const subtitle = document.getElementById('fpSubtitle');
            const icon = document.getElementById('fpIcon');

            let currentStep = 0;
            let selectedMethod = 'email';

            function isPhone(val) {
                const cleaned = val.replace(/[\s\-\(\)]/g, '');
                return /^\+?\d{7,}$/.test(cleaned);
            }

            function normalizePhone(val) {
                let cleaned = val.replace(/[\s\-\(\)]/g, '');
                if (cleaned.length === 11 && cleaned.startsWith('0')) return '+234' + cleaned.substring(1);
                return cleaned;
            }

            const fpIdentifierInput = document.getElementById('fpIdentifier');
            const fpIdentifierIcon = document.getElementById('fpIdentifierIcon');
            const emailSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>';
            const phoneSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';

            if (fpIdentifierInput && fpIdentifierIcon) {
                fpIdentifierInput.addEventListener('input', () => {
                    const val = fpIdentifierInput.value.trim();
                    fpIdentifierIcon.innerHTML = (val && isPhone(val)) ? phoneSvg : emailSvg;
                });
            }

            function updateWizard() {
                fpTrack.style.setProperty('--current-fp-step', currentStep);
                fpSteps.forEach((step, index) => {
                    step.classList.toggle('active-step', index === currentStep);
                });
                btnBack.classList.toggle('hidden', currentStep === 0);

                if (currentStep === 0) {
                    title.textContent = 'Reset Password';
                    subtitle.textContent = 'Enter the email or phone number associated with your account to receive a reset code.';
                    btnNext.querySelector('span').textContent = 'Send Code';
                    icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>';
                } else if (currentStep === 1) {
                    title.textContent = selectedMethod === 'sms' ? 'Verify Phone' : 'Verify Email';
                    subtitle.textContent = selectedMethod === 'sms'
                        ? 'Please enter the 4-digit code sent to your phone number.'
                        : 'Please enter the 4-digit code sent to your email address.';
                    btnNext.querySelector('span').textContent = 'Verify Code';
                    icon.innerHTML = selectedMethod === 'sms'
                        ? '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>'
                        : '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>';
                    setTimeout(() => { const f = document.querySelector('.fp-otp'); if (f) f.focus(); }, 300);
                } else if (currentStep === 2) {
                    title.textContent = 'New Password';
                    subtitle.textContent = 'Create a secure new password for your account.';
                    btnNext.querySelector('span').textContent = 'Update Password';
                    icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path><circle cx="12" cy="16" r="1"></circle><path d="M12 17v2"></path></svg>';
                }
            }

            const fpMethodModal = document.getElementById('fpMethodModal');
            const fpBtnSendOtp = document.getElementById('fpBtnSendOtp');
            const fpMethodModalClose = document.getElementById('fpMethodModalClose');

            function openFpMethodModal() { if (fpMethodModal) fpMethodModal.classList.add('show'); }
            function closeFpMethodModal() { if (fpMethodModal) fpMethodModal.classList.remove('show'); }

            if (fpMethodModalClose) fpMethodModalClose.addEventListener('click', closeFpMethodModal);

            async function doSendFpOtp() {
                const methodInput = document.querySelector('input[name="fpModalVerifyMethod"]:checked');
                selectedMethod = methodInput ? methodInput.value : 'email';

                const identifier = fpIdentifierInput.value.trim();
                if (!identifier) { closeFpMethodModal(); customAlert('Please enter your email or phone number.', true); return; }

                const users = JSON.parse(localStorage.getItem('nd_users') || '[]');
                let foundUser, contact;
                if (isPhone(identifier)) {
                    const norm = normalizePhone(identifier);
                    foundUser = users.find(u => u.phone && u.phone.replace(/[\s\-\(\)]/g, '') === norm.replace(/[\s\-\(\)]/g, ''));
                } else {
                    foundUser = users.find(u => u.email && u.email.toLowerCase() === identifier.toLowerCase());
                }

                if (!foundUser) {
                    closeFpMethodModal();
                    customAlert('No account found with that email or phone number.', true);
                    return;
                }

                contact = selectedMethod === 'email' ? foundUser.email : (foundUser.phone || normalizePhone(identifier));
                closeFpMethodModal();

                const originalHtml = btnNext.innerHTML;
                btnNext.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg><span>Sending...</span>';
                btnNext.disabled = true;

                try {
                    const response = await fetch(`${window.API_BASE}/api/send-otp`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ method: selectedMethod, contact, name: foundUser.firstName || foundUser.name || 'User' })
                    });
                    const data = await response.json();
                    if (data.success) {
                        window._fpContact = contact;
                        window._fpMethod = selectedMethod;
                        currentStep++;
                        updateWizard();
                    } else {
                        customAlert('Failed to send code: ' + (data.error || 'Unknown error'), true);
                    }
                } catch (err) {
                    console.error(err);
                    customAlert('Network error. Is the server running on port 5000?', true);
                } finally {
                    btnNext.innerHTML = originalHtml;
                    btnNext.disabled = false;
                }
            }

            if (fpBtnSendOtp) fpBtnSendOtp.addEventListener('click', doSendFpOtp);

            btnNext.addEventListener('click', async () => {
                if (currentStep === 0) {
                    const identifier = fpIdentifierInput.value.trim();
                    if (!identifier) { customAlert('Please enter your email or phone number.', true); return; }
                    openFpMethodModal();
                } else if (currentStep === 1) {
                    const otps = Array.from(document.querySelectorAll('.fp-otp')).map(i => i.value).join('');
                    if (otps.length < 4) { customAlert('Please enter the 4-digit code.', true); return; }

                    const originalHtml = btnNext.innerHTML;
                    btnNext.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg><span>Verifying...</span>';
                    btnNext.disabled = true;

                    try {
                        const response = await fetch(`${window.API_BASE}/api/verify-otp`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contact: window._fpContact, code: otps })
                        });
                        const data = await response.json();
                        if (data.success) {
                            currentStep++;
                            updateWizard();
                        } else {
                            customAlert(data.error || 'Invalid OTP. Try again.', true);
                        }
                    } catch (err) {
                        customAlert('Network error. Is the server running?', true);
                    } finally {
                        btnNext.innerHTML = originalHtml;
                        btnNext.disabled = false;
                    }
                } else if (currentStep === 2) {
                    const newPass = document.getElementById('fpNewPassword').value;
                    if (!newPass) { customAlert('Please enter a new password.', true); return; }

                    const otps = Array.from(document.querySelectorAll('.fp-otp')).map(i => i.value).join('');

                    const originalHtml = btnNext.innerHTML;
                    btnNext.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg><span>Saving...</span>';
                    btnNext.disabled = true;

                    try {
                        const response = await fetch(`${window.API_BASE}/api/reset-user-credentials`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contact: window._fpContact, code: otps, newValue: newPass })
                        });
                        const data = await response.json();
                        
                        if (data.success) {
                            const identifier = fpIdentifierInput.value.trim();
                            const users = JSON.parse(localStorage.getItem('nd_users') || '[]');
                            let idx;
                            if (isPhone(identifier)) {
                                const norm = normalizePhone(identifier);
                                idx = users.findIndex(u => u.phone && u.phone.replace(/[\s\-\(\)]/g, '') === norm.replace(/[\s\-\(\)]/g, ''));
                            } else {
                                idx = users.findIndex(u => u.email && u.email.toLowerCase() === identifier.toLowerCase());
                            }
                            if (idx !== -1) {
                                users[idx].password = newPass;
                                localStorage.setItem('nd_users', JSON.stringify(users));
                            }
                            
                            btnNext.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span>Success!</span>';
                            btnNext.style.backgroundColor = '#6366f1';
                            setTimeout(() => { window.location.href = 'login.html'; }, 1200);
                        } else {
                            customAlert(data.error || 'Failed to reset password.', true);
                        }
                    } catch (err) {
                        console.error(err);
                        customAlert('Network error resetting password.', true);
                    } finally {
                        btnNext.innerHTML = originalHtml;
                        btnNext.disabled = false;
                    }
                }
            });

            btnBack.addEventListener('click', () => { if (currentStep > 0) { currentStep--; updateWizard(); } });

            const otpInputs = document.querySelectorAll('.fp-otp');
            otpInputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.target.value.length > 1) e.target.value = e.target.value.slice(-1);
                    if (e.target.value && index < otpInputs.length - 1) otpInputs[index + 1].focus();
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) otpInputs[index - 1].focus();
                });
            });

            const resendLink = document.getElementById('fpResend');
            let resendCooldown = 0;
            if (resendLink) {
                resendLink.addEventListener('click', async (e) => {
                    e.preventDefault();
                    if (resendCooldown > 0) return;
                    if (!window._fpContact || !window._fpMethod) return;

                    resendLink.textContent = 'Sending...';
                    resendLink.style.opacity = '0.5';

                    try {
                        const response = await fetch(`${window.API_BASE}/api/send-otp`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ method: window._fpMethod, contact: window._fpContact, name: 'User' })
                        });
                        const data = await response.json();
                        customAlert(data.success ? 'A new code has been sent.' : ('Error: ' + data.error), !data.success);
                    } catch (err) {
                        customAlert('Network error. Is the server running?', true);
                    }

                    resendCooldown = 60;
                    resendLink.style.cursor = 'not-allowed';
                    resendLink.textContent = `Resend Code (60s)`;
                    const timer = setInterval(() => {
                        resendCooldown--;
                        if (resendCooldown <= 0) {
                            clearInterval(timer);
                            resendLink.style.opacity = '1';
                            resendLink.style.cursor = 'pointer';
                            resendLink.textContent = 'Resend Code';
                        } else {
                            resendLink.textContent = `Resend Code (${resendCooldown}s)`;
                        }
                    }, 1000);
                });
            }
        });
    </script>
</body>
</html>
