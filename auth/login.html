<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nd shop - Let's Get Started</title>
    <!-- Use the main app's font and basic resets -->
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="auth.css">

    <!-- Dark Mode Theme System -->
    <link rel="stylesheet" href="../dark-mode/core/variables.css">
    <link rel="stylesheet" href="../dark-mode/core/base.css">
    <link rel="stylesheet" href="../dark-mode/components/auth.css">
    <script src="../dark-mode/theme-manager.js"></script>
    <script src="../custom-alert.js"></script>
    <script src="../api-config.js"></script>
    <script src="../global-fixes.js"></script>
</head>

<body class="auth-body login-page">
    <!-- Decorative background elements -->
    <div class="auth-bg-circle circle-1"></div>
    <div class="auth-bg-circle circle-2"></div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo-wrapper">
                <span id="shopLogoText" class="shop-logo-text">Nd shop</span>
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to manage your shop and track your payouts securely.</p>
        </div>

        <form class="auth-form" id="loginForm" autocomplete="off">
            <div class="auth-input-group">
                <label for="loginIdentifier">Email or Phone Number</label>
                <div class="input-wrapper">
                    <div class="input-icon" id="loginIdentifierIcon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                    </div>
                    <input type="text" id="loginIdentifier" class="auth-input" autocomplete="off"
                        placeholder="e.g. hello@nd.shop or 08012345678" required>
                </div>
            </div>

            <div class="auth-input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <div class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                    </div>
                    <input type="password" id="loginPassword" class="auth-input" autocomplete="new-password"
                        placeholder="Enter your password" required>
                    <button type="button" class="password-toggle" data-target="loginPassword">
                        <!-- Eye icon -->
                        <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <!-- Eye off icon (hidden by default via CSS) -->
                        <svg class="eye-closed hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                    </button>
                </div>
                <div class="forgot-wrapper">
                    <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                </div>
            </div>

            <button type="submit" class="auth-submit-btn">
                <span>Sign In</span>
                <!-- Right arrow SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12" />
                    <polyline points="12 5 19 12 12 19" />
                </svg>
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="signup.html">Create one</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
    <style>
        .shop-logo-text {
            font-size: 2rem;
            font-weight: 800;
            color: #6366f1;
            text-transform: capitalize;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #6366f1 0%, #415A77 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
        }
        [data-theme="dark"] .shop-logo-text {
            background: linear-gradient(135deg, #E0E1DD 0%, #778DA9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</body>

</html>
